<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美国北卡州驾照中文考题 · 清晰版（原图 + 详细解析 + 测验）</title>
<style>
  :root{
    --bg:#eef1f7; --card:#ffffff; --card2:#f5f7fb; --line:#e7ebf3;
    --txt:#1e293b; --mut:#64748b; --accent:#4f46e5; --green:#16a34a;
    --green-bg:#ecfdf3; --red:#dc2626; --red-bg:#fef2f2;
    --yellow:#b45309; --orange:#ea580c;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px -10px rgba(16,24,40,.14);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
    background:radial-gradient(1100px 460px at 50% -160px,#e3e8ff 0,transparent 62%),var(--bg);
    color:var(--txt);line-height:1.7;-webkit-font-smoothing:antialiased;letter-spacing:.01em}
  a{color:var(--accent)}
  .wrap{max-width:824px;margin:0 auto;padding:0 18px 120px}
  header.top{background:linear-gradient(135deg,#4f46e5 0,#7c3aed 55%,#9333ea 100%);color:#fff;
    padding:38px 20px 32px;text-align:center;position:relative;overflow:hidden}
  header.top::after{content:"";position:absolute;top:-60px;right:-40px;width:260px;height:260px;
    background:radial-gradient(circle,rgba(255,255,255,.22),transparent 70%);pointer-events:none}
  header.top h1{margin:0 0 8px;font-size:25px;font-weight:800;letter-spacing:.5px;position:relative}
  header.top p{margin:0;opacity:.92;font-size:13px;position:relative}

  /* 模式栏 */
  .stickytop{position:sticky;top:0;z-index:30;background:rgba(238,241,247,.92);backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--line);box-shadow:0 6px 18px -14px rgba(16,24,40,.4)}
  .modebar{display:flex;gap:8px;padding:11px 18px 4px;overflow-x:auto;justify-content:center}
  .modebar::-webkit-scrollbar{height:0}
  .mode{flex:0 0 auto;padding:9px 16px;border:1px solid var(--line);border-radius:12px;color:var(--mut);
    cursor:pointer;font-size:13.5px;font-weight:600;white-space:nowrap;background:var(--card);transition:.18s}
  .mode:hover{color:var(--accent);border-color:#c7d0e4}
  .mode.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 14px -4px rgba(79,70,229,.55)}
  .mode.wrongm.active{background:var(--red);border-color:var(--red);box-shadow:0 4px 14px -4px rgba(220,38,38,.5)}

  .progwrap{max-width:824px;margin:0 auto;padding:0 18px 10px}
  .progtext{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--mut);margin-bottom:6px}
  .progtext b{color:var(--accent);font-weight:800}
  .progreset{background:none;border:none;color:var(--mut);font-size:12px;cursor:pointer;text-decoration:underline;padding:0}
  .progreset:hover{color:var(--red)}
  .progtrack{height:10px;background:var(--card2);border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .progfill{height:100%;width:0;background:linear-gradient(90deg,#4f46e5,#7c3aed);border-radius:999px;transition:width .35s ease}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:22px 0 6px}
  .toolbar input,.toolbar select{padding:11px 14px;border-radius:12px;border:1px solid var(--line);
    background:var(--card);color:var(--txt);font-size:14px;box-shadow:var(--shadow);outline:none;transition:.18s}
  .toolbar input{flex:1;min-width:150px}
  .toolbar input:focus,.toolbar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.16)}
  .btn{padding:11px 15px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--txt);
    cursor:pointer;font-size:13px;font-weight:600;transition:.18s;box-shadow:var(--shadow)}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{filter:brightness(1.08);color:#fff}
  .btn.danger:hover{border-color:var(--red);color:var(--red)}
  .stat{color:var(--mut);font-size:13px;margin:8px 2px 16px}
  .empty{text-align:center;color:var(--mut);padding:48px 20px;background:var(--card);border:1px dashed var(--line);
    border-radius:18px;margin:16px 0;font-size:15px}
  .empty .big{font-size:42px;margin-bottom:10px}

  /* 知识点总结 */
  .summary{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px 26px;margin:22px 0 12px;box-shadow:var(--shadow)}
  .summary h2{margin:0 0 6px;font-size:19px;font-weight:800}
  details.kp{border-top:1px solid var(--line);padding:12px 0}
  details.kp:first-of-type{border-top:none;padding-top:4px}
  details.kp summary{cursor:pointer;font-weight:700;list-style:none;font-size:15px;display:flex;align-items:center;gap:10px}
  details.kp summary::-webkit-details-marker{display:none}
  details.kp summary::before{content:"+";display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
    border-radius:7px;background:var(--card2);color:var(--accent);font-weight:700;flex:0 0 auto}
  details.kp[open] summary::before{content:"\2013";background:var(--accent);color:#fff}
  details.kp ul{margin:10px 0 4px;padding-left:36px}
  details.kp li{margin:6px 0;color:#475569;font-size:14px}
  details.kp b{color:var(--accent);font-weight:700}

  /* 题卡 */
  .q{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 24px;margin:16px 0;
    scroll-margin-top:78px;box-shadow:var(--shadow);transition:box-shadow .2s}
  .q:hover{box-shadow:0 2px 4px rgba(16,24,40,.05),0 14px 32px -12px rgba(16,24,40,.2)}
  .q .head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .q .num{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:32px;padding:0 9px;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:14px;font-weight:700;border-radius:10px;
    box-shadow:0 4px 12px -3px rgba(79,70,229,.5)}
  .q .catflag{font-size:11.5px;color:var(--mut);background:var(--card2);border:1px solid var(--line);padding:4px 11px;border-radius:999px;font-weight:500}
  .q .wrongbadge{display:none;font-size:11px;color:#dc2626;background:#fff1f1;border:1px solid #fecaca;padding:4px 10px;border-radius:999px;font-weight:600}
  .q.iswrong .wrongbadge{display:inline-block}
  .q .stem{font-size:17px;font-weight:700;margin:0 0 8px;line-height:1.55}
  .q .io{margin:2px 0 14px;color:#475569;font-size:15px}
  .q .io div.row{margin:5px 0;display:flex;gap:8px}
  .q .io b{color:var(--orange);font-weight:800;flex:0 0 auto}
  .opts{display:flex;flex-direction:column;gap:10px;margin:10px 0 4px}
  .opt{display:flex;gap:12px;align-items:center;padding:13px 16px;border:1.5px solid var(--line);border-radius:14px;
    cursor:pointer;background:var(--card);font-size:15px;transition:.16s}
  .opt:hover{border-color:#c7d0e4;background:var(--card2);transform:translateY(-1px)}
  .opt .k{font-weight:800;color:var(--accent);flex:0 0 auto;width:24px;height:24px;display:inline-flex;align-items:center;
    justify-content:center;border:1.5px solid #cbd5e1;border-radius:8px;font-size:13px}
  .opt:hover .k{border-color:var(--accent)}
  .opt.correct{background:var(--green-bg);border-color:var(--green)}
  .opt.correct .k{background:var(--green);color:#fff;border-color:var(--green)}
  .opt.wrong{background:var(--red-bg);border-color:var(--red)}
  .opt.wrong .k{background:var(--red);color:#fff;border-color:var(--red)}
  .reveal{margin-top:14px;display:none;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .reveal.show{display:block}
  .reveal .ans{color:var(--green);font-weight:800;margin-bottom:8px;font-size:15px}
  .reveal .exp{color:#334155;font-size:14.5px;background:var(--card2);border:1px solid var(--line);
    border-left:4px solid var(--accent);padding:13px 17px;border-radius:0 12px 12px 0;line-height:1.9}
  .reveal .exp b{color:var(--txt)}
  .toggle{margin-top:14px;font-size:13.5px;color:var(--accent);font-weight:600;cursor:pointer;user-select:none}
  .toggle:hover{opacity:.7}

  /* 原图 */
  .fig{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;margin:6px 0 14px;text-align:center}
  .fig img{max-width:100%;height:auto;border-radius:8px;image-rendering:auto;background:#fff}
  .fig figcaption{color:var(--mut);font-size:12.5px;margin-top:8px}

  /* 测验 */
  .quizcfg{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;margin:22px 0;box-shadow:var(--shadow)}
  .quizcfg h2{margin:0 0 4px;font-size:19px;font-weight:800}
  .quizcfg p{color:var(--mut);font-size:13.5px;margin:4px 0 16px}
  .cfgrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .quizbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);box-shadow:0 -6px 24px -12px rgba(16,24,40,.3);display:none;
    align-items:center;gap:14px;padding:12px 18px;flex-wrap:wrap;justify-content:center}
  .quizbar.show{display:flex}
  .quizbar .prog{font-size:13.5px;color:var(--txt);font-weight:600}
  .quizbar .prog .ok{color:var(--green)}.quizbar .prog .no{color:var(--red)}
  .result{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px;margin:22px 0;box-shadow:var(--shadow)}
  .result h2{margin:0 0 8px;font-size:21px;font-weight:800;text-align:center}
  .score{text-align:center;font-size:46px;font-weight:800;margin:6px 0 2px}
  .score small{font-size:15px;color:var(--mut);font-weight:600}
  .result h3{font-size:15px;margin:22px 0 10px;font-weight:800}
  .weak{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:8px 0}
  .weak .wt{font-weight:700;color:var(--red);font-size:14px}
  .weak .wk{color:#475569;font-size:13.5px;margin-top:4px;line-height:1.7}
  .wronglist{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .wchip{padding:6px 11px;border:1px solid var(--line);border-radius:10px;background:var(--card);cursor:pointer;font-size:13px;font-weight:600}
  .wchip:hover{border-color:var(--accent);color:var(--accent)}
  .resbtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;justify-content:center}
  .perfect{text-align:center;color:var(--green);font-weight:700;font-size:16px;margin:14px 0}

  footer{color:var(--mut);font-size:12px;text-align:center;margin-top:30px;border-top:1px solid var(--line);padding-top:16px}
  .hidden{display:none!important}
</style>
</head>
<body>
<header class="top">
  <h1>美国北卡州驾照中文考题 · 清晰版</h1>
  <p>共 140 题 · PDF 原图 · 逐题详细解析 · 测验模式（错题总结 + 易错考点 + 循环重做）</p>
</header>

<div class="stickytop">
<div class="modebar" id="modebar">
  <button class="mode active" data-mode="all">📖 全部题目</button>
  <button class="mode" data-mode="sum">📚 考点总结</button>
  <button class="mode" data-mode="quiz">📝 测验 / 刷题</button>
  <button class="mode wrongm" data-mode="wrong">📕 错题本 (0)</button>
</div>

<div class="progwrap" id="progWrap">
  <div class="progtext"><span id="progLabel">已完成 0 / 140 题</span><button class="progreset" id="progReset">重置进度</button></div>
  <div class="progtrack"><div class="progfill" id="progFill"></div></div>
</div>
</div>

<div class="wrap">

  <!-- 浏览工具 -->
  <div class="toolbar" id="browseTools">
    <select id="catSel"></select>
    <input id="search" type="text" placeholder="🔍 搜索关键词：超车 / 酒精 / 限速 / 闪灯…">
    <button class="btn" id="revealAll">展开答案</button>
    <button class="btn" id="hideAll">收起重置</button>
    <button class="btn danger hidden" id="clearWrong">清空错题本</button>
  </div>
  <div class="stat" id="counter"></div>

  <!-- 考点总结 -->
  <section class="summary hidden" id="summaryBox"></section>

  <!-- 测验配置 -->
  <section class="quizcfg hidden" id="quizCfg">
    <h2>📝 测验 / 刷题模式</h2>
    <p>选好范围开始作答；做完点"本轮总结"，会统计得分、列出错题、归纳你最易错的考点和知识点，并可一键重做错题——如此往复，直到全对。</p>
    <div class="cfgrow">
      <button class="btn primary" data-quiz="all">全部 140 题</button>
      <button class="btn" data-quiz="r30">随机 30 题</button>
      <button class="btn" data-quiz="r50">随机 50 题</button>
      <button class="btn danger" data-quiz="wrong">只做错题本</button>
    </div>
    <div class="cfgrow">
      <select id="quizCatSel"></select>
      <button class="btn" data-quiz="cat">按所选考点出题</button>
    </div>
  </section>

  <!-- 结果 -->
  <section class="result hidden" id="resultBox"></section>

  <div id="empty" class="empty hidden"></div>
  <div id="list"></div>

  <footer>
    资料来源：《美国北卡州驾照中文考题清晰版（简体）》PDF（微信公众号 Amy说一说 / YouTube：Ciao Amy）。<br>
    示意图为 PDF 原图，答案以原卷答案表为准；原卷个别答案有争议处已用 ⚠ 标注。错题与进度保存在本机浏览器。仅供学习参考。
  </footer>
</div>

<div class="quizbar" id="quizBar">
  <span class="prog" id="quizProg"></span>
  <button class="btn primary" id="quizFinish">本轮总结</button>
  <button class="btn" id="quizExit">退出测验</button>
</div>

 exp:"<b>考点：</b>什么算'驾驶'、因而必须随身带证。<br><b>I 引擎运转时坐在驾驶位（对）：</b>引擎在转、你坐驾驶位、随时能让车移动，法律上就是在操控车辆，必须带证。<br><b>II 车被推或牵引时坐驾驶位（对）：</b>哪怕引擎没着，只要车在动、你掌握方向盘和刹车，你仍在控制这台车，同样算驾驶。<br><b>结论：</b>两种都算驾驶，都要带证，选 C。<br>💡 口诀：只要你能对车施加控制（方向/制动），不管引擎开关，都视为驾驶、都要带驾照。"},

{n:3,cat:"驾照制度",type:"io",q:"以下哪项正好符合记点制度？",i:"驾驶者在三年内记 4 点，将得到警告信",ii:"驾驶者在三年内记 12 点，将失去驾照",ans:"B",
 exp:"<b>什么是'点(Points)'：</b>北卡有'驾照记点制度'——你每被判一次交通违章，DMV 就按轻重往驾照档案记上分数（超速、鲁莽各有分值），用来衡量你违章累积程度。<br><b>I 三年内 4 点发警告信（错）：</b>北卡没有'满 4 点寄警告信'这条规定，4 点不是任何法定节点。<br><b>II 三年内 12 点失去驾照（对）：</b>3 年内累计满 12 点，DMV 有权吊照。<br><b>结论：</b>只有 II 对，选 B。<br>💡 牢记两个真正的节点：<b>7 点</b>→可能被要求上驾驶改善课；<b>12 点</b>→吊照。<br>🎵 口诀：三年记点——十二点吊照、七点要上课，'四点警告'是假的。"},
{n:4,cat:"驾照制度",type:"io",q:"当驾驶者总共得到 7 点时可能会发生什么？",i:"要求驾驶者提供经济担保证明",ii:"驾驶者完成驾驶训练所学习可减 3 个点",ans:"B",
 exp:"<b>承上：</b>这里的'点'就是第 3 题的驾照记点。<br><b>I 提供经济担保证明（错）：</b>财力/担保证明通常因无保险驾驶或重大事故引发，和'记满 7 点'没有因果关系。<br><b>II 完成驾驶训练可减 3 点（对）：</b>累计到 7 点时，DMV 可要求/允许你参加官方'驾驶改善课程'，结业后从档案扣减 3 点。<br><b>结论：</b>只有 II 对，选 B。<br>💡 7 点=上课减分门槛；别和 12 点（吊照）搞混。<br>🎵 口诀：满七点，上驾驶课减三分。"},
{n:5,cat:"驾照制度",type:"mc",q:"以下哪一项罚点数最高？",opts:["鲁莽地开车","撞坏他人车而逃跑","没有驾驶执照开车","超过一辆正在下车的校车（记 5 分）"],ans:"D",
 exp:"<b>考点：</b>哪种违章记分最高。<br><b>正确 D（超越正在下客的校车，5 分）：</b>校车停下亮红灯、伸出停车臂时正在上下学生，此刻超越极易撞到横穿的孩子，是最危险的违章，记分最高。<br><b>逐项：</b>A 鲁莽驾驶、B 肇事逃逸、C 无照驾驶都很严重也都受罚，但本题比的是'记分高低'，D 最高。<br>💡 规律：凡涉及校车、儿童，处罚一律最重。<br>🎵 口诀：校车下客你敢超，记五分罚最重。"},
{n:6,cat:"驾照制度",type:"mc",q:"驾驶者在以下哪种情况下将失去驾照？",opts:["没有驾照时开车","超过一辆停着的校车","没有让给有优先权的车辆","在时速 55 英里地带超过 70 英里"],ans:"D",
 exp:"<b>考点：</b>哪种情形会被直接吊照。<br><b>正确 D（55 限速区开到 70+）：</b>在限速 55 路段开到 70 英里以上，超速幅度极大（严重超速），可被直接吊照。<br><b>逐项：</b>A 无照、B 超越停着(未下客)的校车、C 不让先行权也违法记分，但本题取后果最重的'严重超速'。<br>💡 超得越离谱罚越重，可直接吊照。"},
{n:7,cat:"驾照制度",type:"io",q:"取回被撤销的驾照，必须做到…",i:"得到当地驾照部门重新申请执照的许可",ii:"去驾照部门支付恢复费，重新申请执照",ans:"C",
 exp:"<b>考点：</b>驾照被撤销后怎样拿回。<br><b>I 取得重新申请的许可（对）：</b>必须先获得相关部门同意你重新申请的许可。<br><b>II 缴恢复费并重新申请（对）：</b>还要去 DMV 交一笔'恢复费(restoration fee)'并重新办理申请。<br><b>结论：</b>两步缺一不可，选 C。<br>💡 恢复驾照=拿到许可 + 交钱重办，两件都要做。"},
{n:8,cat:"酒精药物",type:"io",q:"大约一半的车祸发生于…",i:"饮酒过度者",ii:"与一台以上车辆有关",ans:"A",
 exp:"<b>题意：</b>问'大约一半的（致命）车祸'有什么共同特征。<br><b>I 饮酒过度者（对）：</b>长期统计显示约一半致命事故与酒精有关——酒驾是车祸致死的最大单一原因，这是本题核心。<br><b>II 涉及一台以上车辆（错）：</b>很多致命事故其实是单车（撞树、翻车、冲出路面），'涉及多车'不是半数车祸的特征。<br><b>结论：</b>只有 I 对，选 A。<br>💡 一句话：约一半致命车祸=酒精惹的祸。"},
{n:9,cat:"酒精药物",type:"mc",q:"饮酒过度导致意外死亡的比率是…",opts:["10%","50%","38%","67%"],ans:"C",
 exp:"<b>考点：</b>过量饮酒导致意外死亡的大致比例。<br><b>正确 C（38%）：</b>按本卷（PDF 答案表）口径，约 38% 的意外死亡与过量饮酒有关。<br><b>逐项：</b>10%、50%、67% 都不符本卷给定数据。<br>💡 注意区分：第 8 题说'约一半车祸涉酒'，本题问'饮酒导致意外死亡的比率=38%'，两个数字别混。<br>🎵 口诀：酒后丧命，约三成八（38%）。"},
{n:10,cat:"行人自行车",type:"io",q:"以下哪个关于行人死亡的陈述是正确的？",i:"在城市死于车祸的 5 人中有 2 人是行人",ii:"死于车祸的行人当中多数人是青少年",ans:"A",
 exp:"<b>I 城市死者每 5 人有 2 人是行人（对）：</b>城市行人多、与车混行，行人在车祸死者中占比相当高（约 2/5）。<br><b>II 死亡行人多为青少年（错）：</b>行人死者并不以青少年为主，老人、儿童因行动慢、个子矮风险也很高。<br><b>结论：</b>只有 I 对，选 A。<br>💡 城市里行人是高危群体，要格外当心。"},
{n:11,cat:"行人自行车",type:"io",q:"晚上在没有人行道的路上行走，应怎样做？",i:"穿或拿白色东西，并在与车辆相反方向（逆向）一侧行走",ii:"走在与车流同方向的一侧",ans:"A",
 exp:"<b>题意：</b>晚上走在没有人行道的公路上，怎样最安全。<br><b>I 穿白色物 + 走在与车辆相反方向一侧（对）：</b>① 穿戴白色/反光物，让车灯更早照到你；② 走在'与车辆相反方向'一侧，即<b>面对来车（逆向）</b>，能直接看见迎面来车、随时往路边躲。<br><b>II 走在与车流同方向一侧（错）：</b>顺着车流走，车都从背后来，你看不见、无法预判，很危险。<br><b>结论：</b>只有 I 对，选 A。<br>💡 口诀：<b>走路逆行（面对车）、骑车顺行（同向）</b>——对照第 81 题。"},
{n:12,cat:"路权",type:"mc",q:"在交叉路上没有交通灯，谁有优先行驶权？",ans:"A",img:true,cap:"原版考题图：路口有行人正在通过。",opts:["行人优先","驾驶者优先","谁也没有优先权","先到交叉路者优先"],
 exp:"<b>看图：</b>没有红绿灯的路口，有车要通过，同时有行人正在过马路。<br><b>正确 A（行人优先）：</b>无论有没有信号灯，行人都享有先行权，车辆必须停下礼让正在穿越的行人。<br><b>逐项：</b>B 驾驶者优先、C 谁都没有、D 先到者优先，都把车排在行人前面，错误。<br>💡 铁律：任何路口，行人永远第一。"},
{n:13,cat:"车辆保养",type:"mc",q:"北卡法律规定，车辆多长时间须验车一次？",opts:["6 个月","12 个月","18 个月","24 个月"],ans:"B",
 exp:"<b>正确 B（12 个月）：</b>北卡要求机动车每 12 个月（每年）做一次安全/尾气检验，合格才能续注册。<br><b>逐项：</b>6、18、24 个月都不是法定周期。<br>💡 记'每年一检'。<br>🎵 口诀：验车一年一回，准时别拖。"},
{n:14,cat:"安全驾驶",type:"mc",q:"安全驾驶者应该做到…",opts:["为避免离开路线只观察路边","经常观察后视镜和侧视镜","为保持清醒晚上开车喝咖啡","高速上与前车保持两台车距离"],ans:"B",
 exp:"<b>正确 B（常看后视镜和侧镜）：</b>安全驾驶核心是'持续扫描'——余光扫前方、并经常瞄后视镜和两侧镜，时刻掌握四周动态，才能提前预判危险。<br><b>逐项：</b>A 只盯路边漏看前方；C 喝咖啡只能短暂提神（见第 16 题）；D 高速仅留两车身太近，应按'两秒法则'（见第 100 题）。<br>💡 好司机=眼睛一直在动、镜子常常看。"},
{n:15,cat:"转弯车道",type:"io",q:"驶进交叉路口右转时应打开右转向灯，并…",i:"稍微向路中心移动以便留点空间向右转",ii:"把手伸向车外",ans:"D",
 exp:"<b>I 向路中心移动留空间右转（错）：</b>右转应尽量贴右、紧靠路缘转过去，向路中心偏移会切到别的车道。<br><b>II 把手伸出车外（错）：</b>现代车都有电动转向灯，打灯即可，无需把手伸出窗外做手势。<br><b>结论：</b>两项都不对，选 D。<br>💡 右转要诀：提前打右灯、靠最右、贴着转。"},
{n:16,cat:"疲劳驾驶",type:"mc",q:"当驾车长途旅行，感到困倦时应如何做？",opts:["停车休息","加速","打开车窗或通气孔放进新鲜空气","喝咖啡"],ans:"A",
 exp:"<b>正确 A（停车休息）：</b>真正能解决困倦的只有休息——找安全地点停车小睡或走动。<br><b>逐项：</b>B 加速更危险；C 开窗、D 喝咖啡只能提神几分钟，疲劳会很快回来，不可靠。<br>💡 困了就停，别硬撑——疲劳驾驶和酒驾一样致命。"},
{n:17,cat:"疲劳驾驶",type:"mc",q:"驾车长途旅行，应该…",opts:["时常揉一揉眼睛消除疲劳","避免看一种东西超过几秒钟以上","只目视前方道路中心","看前方与注视车镜一样多"],ans:"B",
 exp:"<b>正确 B（避免盯一处超过几秒）：</b>长途要让视线不停地远近、左右扫动；长时间盯住前方一点容易产生'公路催眠(highway hypnosis)'而走神、犯困。<br><b>逐项：</b>A 揉眼分心又不解决疲劳；C 只盯道路中心漏看两侧；D 把同样注意力放在车镜会忽略正前方。<br>💡 眼睛要'扫描'，不要'发呆'。"},
{n:18,cat:"安全驾驶",type:"io",q:"为了避免其他车撞在后面，应该…",i:"小心开车并经常刹车",ii:"经常观察后视镜",ans:"B",
 exp:"<b>I 小心开并经常刹车（错）：</b>无缘无故频繁踩刹车，反而让后车措手不及、更容易追尾你。<br><b>II 经常看后视镜（对）：</b>勤看后视镜掌握后车距离速度，必要时平稳、提前地减速并给后车留反应空间，才是防被追尾的正确做法。<br><b>结论：</b>只有 II 对，选 B。<br>💡 防追尾靠'看后镜+平稳减速'，不是靠'多踩刹车'。"},
{n:19,cat:"安全驾驶",type:"io",q:"研究结果表明，非常危险的是…",i:"中年驾驶者",ii:"开车慢的驾驶者",ans:"B",
 exp:"<b>I 中年驾驶者（错）：</b>中年人经验较足，不是高危群体。<br><b>II 开车慢的驾驶者（对）：</b>明显低于车流速度的慢车会打乱整体节奏，逼后车频繁变道超车，极易引发刮蹭和追尾。<br><b>结论：</b>选 B。<br>💡 在快路上'太慢'本身就是危险。"},
{n:20,cat:"安全驾驶",type:"io",q:"开车太慢，在以下哪种情况下特别危险？",i:"刚刚过山顶",ii:"刚刚过转弯处",ans:"C",
 exp:"<b>I 刚过山顶（对）：</b>后车从坡顶冲下、越过坡顶才发现你的慢车，此时两车已很近，来不及反应。<br><b>II 刚过转弯处（对）：</b>弯道挡住后车视线，它转出弯才看见你，同样发现太晚。<br><b>结论：</b>两种都危险，选 C。<br>💡 山顶后、弯道后是'视线盲区'，在那儿慢行最易被追尾。"},
{n:21,cat:"限速",type:"io",q:"以下哪种在北卡开阔路面上的限速是正确的？",i:"除非有标志说明，汽车货车限速 65 英里",ii:"学校课外活动车的限速是 55 英里",ans:"B",
 exp:"<b>背景数字（北卡默认限速，无标志时）：</b>市区 35、市外开阔路 55、普通校车 45、学校课外活动车 55、州际公路可达 70。<br><b>I 汽车货车限速 65（错）：</b>开阔（市外）路面无标志时默认是 <b>55</b>，不是 65。<br><b>II 学校课外活动车限速 55（对）：</b>专门接送学生去比赛/活动的'课外活动车'限速 55，正确。<br><b>结论：</b>只有 II 对，选 B。<br>💡 区分：普通校车 45（见第 90 题），课外活动车 55。<br>🎵 口诀：限速口诀：市内三五、郊外五五；校车四五、活动五五。"},
{n:22,cat:"限速",type:"io",q:"以下哪一项关于在北卡汽车的限速是正确的？",i:"在市外的限速是 55 英里（无标志时）",ii:"在市区的限速是 25 英里（无标志时）",ans:"A",
 exp:"<b>I 市外 55（对）：</b>市区以外的开阔路面，无标志时默认 55 英里，正确。<br><b>II 市区 25（错）：</b>市区无标志时默认是 <b>35</b>，不是 25。<br><b>结论：</b>只有 I 对，选 A。<br>💡 死记：市区 35、市外 55。<br>🎵 口诀：限速口诀：市内三五、郊外五五；校车四五、活动五五。"},
{n:23,cat:"限速",type:"io",q:"在北卡，正确的限速是哪项？",i:"无标志时市区限速 35 英里",ii:"无标志时校课外活动车限速 25 英里",ans:"A",
 exp:"<b>I 市区 35（对）：</b>市区无标志默认 35 英里，正确。<br><b>II 校课外活动车 25（错）：</b>学校课外活动车限速是 <b>55</b>，不是 25。<br><b>结论：</b>只有 I 对，选 A。<br>💡 一句背全：市区 35 / 市外 55 / 校车 45 / 课外活动车 55。<br>🎵 口诀：限速口诀：市内三五、郊外五五；校车四五、活动五五。"},
{n:24,cat:"转弯车道",type:"mc",q:"在转弯处，汽车倾向于…",opts:["加速","移向弯道的里圈","保持在道路中心","移向弯道的外圈"],ans:"D",
 exp:"<b>正确 D（移向弯道外圈）：</b>车辆转弯时受惯性（离心作用）被'甩'向弯道外侧；车速越快甩得越厉害，所以入弯前必须先减速，否则会冲出外侧。<br><b>逐项：</b>A 加速、B 移向里圈、C 保持中心都不符合惯性规律。<br>💡 记住'弯道甩外侧'，第 25 题同理。"},
{n:25,cat:"转弯车道",type:"mc",q:"圈中的车在转弯处，倾向于走哪条路？",ans:"C",img:true,cap:"原版考题图：弯道中标有 A/B/C/D 四条轨迹。",opts:["A 方向","B 方向","C 方向","D 方向"],
 exp:"<b>看图：</b>车在弯道里，标有 A/B/C/D 四条可能轨迹。<br><b>正确 C：</b>与第 24 题同理，惯性把车体推向弯道外侧，对应图中那条偏外的 C 轨迹。<br>💡 不减速过弯，车就顺着惯性往外'跑'到 C。"},
{n:26,cat:"转弯车道",type:"io",q:"急转弯时，应注意哪些？",i:"尽可能靠近左线",ii:"在急转弯处使用刹车",ans:"D",
 exp:"<b>I 尽量靠近左线（错）：</b>贴左线转弯容易压到或越过中线，与对向车冲突。<br><b>II 在急弯处使用刹车（错）：</b>弯中踩刹车会让车轮失去抓地、引发侧滑甚至失控；应在<b>入弯前</b>减速完毕。<br><b>结论：</b>两项都不可取，选 D。<br>💡 过弯口诀：弯前减速、弯中匀速稳住、弯后再加速。"},
{n:27,cat:"酒精药物",type:"io",q:"哪种情况你的驾照马上被执法部吊销 30 天？",i:"拒绝依法进行化学或呼吸测验",ii:"测验结果血液酒精含量 0.08% 或以上",ans:"B",
 exp:"<b>I 拒测（本题不计）：</b>拒绝检测触发的是另一套行政吊照（≥12 个月，见第 2 题），不是这里的 30 天。<br><b>II 血检 0.08%+（对）：</b>当场检测血液酒精达 0.08% 或以上（达法定醉驾），驾照被当场吊销 30 天。<br><b>结论：</b>本卷取 B。<br>💡 0.08% 是醉驾红线，触线即罚。<br>🎵 口诀：零八（0.08%）当场吊卅天（30）。"},
{n:28,cat:"转弯车道",type:"io",q:"下陡坡时除了减速，还应该做什么？",i:"使用低档",ii:"弯弯曲曲地行驶",ans:"A",
 exp:"<b>I 使用低档（对）：</b>下长陡坡挂低档，利用'发动机制动'帮助控速，避免长时间踩刹车导致过热失灵。<br><b>II 弯弯曲曲行驶（错）：</b>蛇形下坡既违规又极易失控。<br><b>结论：</b>选 A。<br>💡 长下坡=低档+轻点刹车，别一直踩死刹车。"},
{n:29,cat:"路权",type:"mc",q:"图中表明哪辆车转弯正确？",ans:"C",img:true,cap:"原版考题图：路口处 1/2/3 号车的不同转弯轨迹。",opts:["1 号车","2 号车","3 号车","4 号车"],
 exp:"<b>看图：</b>路口处几辆车在转弯，比较谁的轨迹规范。<br><b>正确 C（3 号车）：</b>正确转弯应转入目标方向'最靠近'的那条车道，全程不切弯、不占对向道——图中 3 号车的弧线正好符合（左转从最左道进最左道、右转贴右）。<br>💡 转弯=进最近的车道，别一脚切到对向去。"},
{n:30,cat:"超车",type:"io",q:"如果在双线路上超车，应该采取…",i:"按汽车喇叭引起前车驾驶者的注意",ii:"开左转向灯让后车驾驶者知道超越意图",ans:"C",
 exp:"<b>I 鸣笛提醒前车（对）：</b>可用喇叭或灯光让前车知道你要超。<br><b>II 打左转向灯告知后车（对）：</b>超车前先打左灯，让后方车辆知道你要并出去超车。<br><b>结论：</b>两者都该做，选 C。<br>💡 超车前：先示意前车、再打灯给后车，确认安全再超。"},
{n:31,cat:"超车",type:"mc",q:"图中哪辆车可以超车？",ans:"C",img:true,cap:"原版考题图：双向多车道上的 1 号车与 2 号车。",opts:["只 1 号车","只 2 号车","1、2 号车均可","1、2 号车皆非"],
 exp:"<b>看图：</b>双向多车道路上，1 号车、2 号车各在一侧。<br><b>正确 C（两辆都可）：</b>当两车各自这一侧的中线都是'虚线'（允许越线）、且前方视野开阔无来车时，1 号、2 号在确认安全后都可以超车。<br>💡 看你这侧是不是虚线，是虚线+安全就能超。"},
{n:32,cat:"超车",type:"mc",q:"图中哪辆车可以安全超车？",ans:"D",img:true,cap:"原版考题图：A/B/C/D 四种路况下的车辆。",opts:["A 车","B 车","C 车","D 车"],
 exp:"<b>看图：</b>A/B/C/D 四种不同路况下的车。<br><b>正确 D：</b>只有 D 车所处路段：标线允许超车（虚线）、前方视距充足、对向没有来车，才能安全超车。<br><b>逐项：</b>A 是实线禁止超车；B 处在弯道、视线被挡；C 临近交叉路口，都不具备安全超车条件。<br>💡 超车四看：标线、视距、对向车、距离，缺一不可。"},
{n:33,cat:"超车",type:"mc",q:"图中哪辆车可以安全超过货车？",ans:"D",img:true,cap:"原版考题图：货车前后的 1 号车与 2 号车。",opts:["只 1 号车","只 2 号车","1、2 号车均可","1、2 号车皆非"],
 exp:"<b>看图：</b>货车前后各有 1 号、2 号车。<br><b>正确 D（都不能超）：</b>图中两辆车要么是黄实线禁超、要么视距不够、要么与货车距离太近，都不具备安全超越大货车的条件，所以 1、2 号都不该超。<br>💡 超大车需要更长距离和视野，条件不足宁可不超。"},
{n:34,cat:"超车",type:"io",q:"在什么条件下从右边超车合法？",i:"两个方向各有两条车道",ii:"单行道",ans:"C",
 exp:"<b>前提：</b>正常超车都应从<b>左侧</b>进行；从右边超很危险，因为右侧是司机盲区、别人也没料到你会从右边窜出，所以一般法律禁止右侧超车。<br><b>I 同方向各有两条车道（对）：</b>这时右边本来就有一条正规同向车道，你只是正常变到右道往前开，不越对向、也不挤占别人，合法。<br><b>II 单行道（对）：</b>单行道上所有车都同向、根本没有对向来车，从右侧通过也安全合法。<br><b>结论：</b>两种都对，选 C。<br>💡 右侧超车之所以合法，是因为这两种情况右边都有'属于你的车道'可走、不必越线。"},
{n:35,cat:"安全驾驶",type:"io",q:"倒车时，应注意什么？",i:"把时速控制在 10 英里以下，转过头眼睛看后面",ii:"双手紧握驾驶盘",ans:"A",
 exp:"<b>I 车速 10 英里以下、转头看后方（对）：</b>倒车要极慢，并直接扭头从后窗看（光靠后视镜有盲区），随时能停。<br><b>II 双手紧握方向盘（错）：</b>倒车通常一手扶盘、一手搭副驾椅背以便转身回头看，'双手死握盘'反而妨碍回头，不是要点。<br><b>结论：</b>选 A。<br>💡 倒车=慢 + 回头看，必要时先下车看清车后。<br>🎵 口诀：倒车要慢，十迈封顶，回头看。"},
{n:36,cat:"路权",type:"mc",q:"车流多的地方，A 车驾者看到 B 车正要离开停车位（如图），A 应采取什么行动？",ans:"C",img:true,cap:"原版考题图：B 车正从路边车位倒出，A 车驶来。",opts:["加速超越正在倒退的车","稍向左线道移动让路","减速准备停车","按喇叭继续行驶"],
 exp:"<b>看图：</b>车流密集，前方 B 车正从路边车位往外倒，A 车正驶来。<br><b>正确 C（减速准备停车）：</b>车多、左边又无法变道避让时，A 应减速、做好停车准备，让出空间给 B 倒出来。<br><b>逐项：</b>A 加速抢行、B 占左道（车多时危险）、D 按喇叭硬冲都可能酿祸。<br>💡 见别人倒车出位，先减速让，别抢。"},
{n:37,cat:"安全驾驶",type:"mc",q:"你应在何时调节后镜及侧镜？",opts:["在上车前","在车内开车前","在车辆向后行驶时","在车辆向前行驶时"],ans:"B",
 exp:"<b>正确 B（车内开车前）：</b>应上车坐好、系好安全带、起步之前就把后视镜和两侧镜全部调到位；一旦开动再调镜会严重分心。<br><b>逐项：</b>A 人没坐进驾驶位、坐姿没定调了也不准；C/D 行驶中调镜很危险。<br>💡 顺序：上车→调座椅→调镜子→系安全带→起步。"},
{n:38,cat:"路权",type:"mc",q:"图中哪辆车应该让？",ans:"D",img:true,cap:"原版考题图：路口处 A/B/C/D 四辆车。",opts:["A 车","B 车","C 车","D 车"],
 exp:"<b>看图：</b>路口处 A/B/C/D 四辆车。<br><b>正确 D：</b>D 车是从次要道路/转弯方向汇入主干路的一方，按路权规则必须让其他享有先行权（在主干道直行）的车先过。<br>💡 从支路/转弯进主路的车，要让主路直行车。"},
{n:39,cat:"安全驾驶",type:"mc",q:"车祸发生最频繁的地方是在…",opts:["山坡上","弯路上","交叉路上","桥上"],ans:"C",
 exp:"<b>正确 C（交叉路口）：</b>路口是各方向车流、行人、转弯动作交汇之处，'冲突点'最多，因此事故最高发。<br><b>逐项：</b>山坡、弯路、桥面也有风险，但频率都不及交叉路口。<br>💡 过路口务必减速、左右观察。"},
{n:40,cat:"路权",type:"mc",q:"交叉路没交通灯或标志，图中照哪个顺序通过？",ans:"A",img:true,cap:"原版考题图：四向路口的 A/B/C 三车。",opts:["A 车，B 车，C 车","B 车，A 车，C 车","C 车，A 车，B 车","B 车，C 车，A 车"],
 exp:"<b>题意：</b>没有红绿灯、也没有停车/让行标志的十字路口，A/B/C 三车按什么顺序通过。<br><b>怎么读图：</b>看谁离路口最近——图中 A 已最靠近、几乎进入路口（先到），B 次之，C 最远。<br><b>规则：</b>无灯无标志路口①先到的先走 ②同时到则让右边的车 ③左转车让对向直行。<br><b>结论：</b>按到达先后 A→B→C，选 A。<br>💡 不用背复杂规则，看图里哪辆车离路口最近就先走，其余按远近排。"},
{n:41,cat:"路权",type:"mc",q:"如图中所示，先行权属于…",ans:"D",img:true,cap:"原版考题图：1 号车、2 号车与一名行人。",opts:["1 号车驾驶者","2 号车驾驶者","只属于行人","属于 1 号车和行人"],
 exp:"<b>怎么读图：</b>1 号车在<b>直行</b>（车头向下的箭头）；2 号车旁有一条弯箭头，表示它<b>正在左转</b>；路口还有行人正在过街。<br><b>两条规则：</b>①行人永远优先 ②左转车必须让对向直行车。<br><b>推理：</b>行人先行✓；2 号在左转、必须让直行的 1 号车，所以 1 号车也先行；2 号车最后走。<br><b>结论：</b>先行权属于'1 号车和行人'，选 D。<br>💡 口诀：左转让直行、所有车让行人——谁左转谁最后。"},
{n:42,cat:"路权",type:"mc",q:"交叉路上有交通灯或标志，先行权属于…",ans:"D",img:true,cap:"原版考题图：信号/标志路口的 A/B/C 车。",opts:["只有 A 车","先 A 车后 B 车","先 B 车后 A 车","B 车"],
 exp:"<b>看图：</b>有交通灯/标志控制的路口，A/B/C 车。<br><b>正确 D（B 车）：</b>按信号或标志，处在绿灯方向/直行干道、拥有通行权的是 B 车，所以先行权属于 B 车。<br>💡 有信号时一切以信号为准，绿灯/主路直行方先行。"},
{n:43,cat:"安全驾驶",type:"io",q:"在市区大街上驾驶时应注意…",i:"从侧面街道驶入的汽车",ii:"从停着的车中突然冒出的动物和小孩",ans:"C",
 exp:"<b>I 从侧街驶入的车（对）：</b>市区横向小街多，要随时防从侧面街口突然驶出的车。<br><b>II 从停车间窜出的小孩和动物（对）：</b>路边停满车，孩子或动物可能突然从车缝冲到路上，必须警惕。<br><b>结论：</b>两者都要防，选 C。<br>💡 市区开车=慢 + 处处提防'突然出现'。"},
{n:44,cat:"路权",type:"mc",q:"接近没有交通标志、视线被树或建筑物挡住而看不满四方的交叉路口应…",opts:["以交通标志规定的时速行驶","在路口中心附近停车，安全时继续行驶","减速并按喇叭警告看不见的驾驶者","在路口外停车，然后慢慢向前移动"],ans:"D",
 exp:"<b>正确 D（路口外停车，再慢慢往前挪）：</b>当树木/建筑挡住视线、看不清左右来车时，先在路口外完全停下，再一点点向前移动，逐步把视野探出去，确认安全再通过。<br><b>逐项：</b>A 看不清还按标志速度走太冒险；B 停在路口中心危险；C 光按喇叭不能保证别人停。<br>💡 看不清=先停、再'蚂蚁式'探头前移。"},
{n:45,cat:"安全驾驶",type:"io",q:"行驶在交通繁忙地段，应该注意什么？",i:"注意突然停车的驾驶者",ii:"只有在行人穿越道上才让给行人",ans:"A",
 exp:"<b>I 注意突然停车的驾驶者（对）：</b>车流密集时前车随时可能急停，要保持距离、随时准备刹车。<br><b>II 只在人行横道才让行人（错）：</b>礼让行人不限于斑马线，任何位置遇到行人都要让。<br><b>结论：</b>只有 I 对，选 A。<br>💡 让行人不分地点；繁忙路段更要防急停。"},
{n:46,cat:"转弯车道",type:"mc",q:"在一交叉路上想左转，但走错车道，应该…",opts:["继续往前，到下一个交叉路口才转弯","先倒退后开进正确的车道才转弯","等所有车通过了交叉路才转弯","示意旁边驾者，在那车前面转弯"],ans:"A",
 exp:"<b>正确 A（继续直行，到下个路口再转）：</b>发现进错车道、来不及在本路口转弯时，应将错就错继续往前，到下一个路口再调整方向。<br><b>逐项：</b>B 在路口倒车、C 长时间停着等、D 抢在别人前强行转，都非常危险且违法。<br>💡 宁可多绕一圈，也不在路口倒车或硬转。"},
{n:47,cat:"高速公路",type:"mc",q:"在高速道路上最常见的车祸类型是…",opts:["车身碰撞","驶出路外","首尾碰撞","正面碰撞"],ans:"C",
 exp:"<b>正确 C（首尾碰撞/追尾）：</b>高速上车辆同向高速行驶，一旦跟车太近或前车突然减速，后车反应不及就追尾，是高速最常见的事故类型。<br><b>逐项：</b>有中央隔离带的高速很少发生正面碰撞(D)。<br>💡 高速防追尾：拉开车距、留足反应时间。"},
{n:48,cat:"高速公路",type:"io",q:"在高速道路上长途旅行，应该准备做什么？",i:"每 100 英里在休息站休息",ii:"计划部分时间在晚上开车，以避免车流",ans:"A",
 exp:"<b>I 每 100 英里休息（对）：</b>长途每开约 100 英里就到服务区休息一下，能有效预防疲劳。<br><b>II 安排晚上开避车流（错）：</b>夜间视线差、更易困倦，刻意把行程排在晚上反而更危险。<br><b>结论：</b>选 A。<br>💡 长途要勤休息，别专挑夜里赶路。<br>🎵 口诀：长途百里一歇脚。"},
{n:49,cat:"紧急故障",type:"mc",q:"在高速路上车发生故障被迫停路旁，应该…",opts:["坐在车内，耐等救兵","白手巾绑车左门把手，站右挡板前","支起车盖，白手巾绑车左门把手","支起车盖并站车后让来车看见"],ans:"C",
 exp:"<b>正确 C（支起引擎盖 + 白布绑左门把手）：</b>掀引擎盖、在车门把手系白布，是国际通用的'车辆故障、需要帮助'信号，能让过路车和警察识别。<br><b>逐项：</b>A 坐车里干等不安全；B、D 站在靠车流一侧或车尾，极易被来车撞到。<br>💡 抛锚=支盖+白布+人离开车流侧到护栏外等。"},
{n:50,cat:"高速公路",type:"mc",q:"研究表明高速公路上卷入车祸的机会也会很多，如果驾驶者…",opts:["保持平稳速度","行驶在比标志限速相当低的速度","行驶在跟限速一致的速度","与同车道前后车保持距离"],ans:"B",
 exp:"<b>正确 B（开得比限速低很多）：</b>车速远低于周围车流，会迫使后车不断减速、变道、超你，打乱节奏，反而大大增加被刮蹭、追尾的概率。<br><b>逐项：</b>A 平稳速度、C 与限速一致、D 与前后车保持距离都是安全做法。<br>💡 高速上'太慢'和'太快'一样危险，跟上车流最安全。"},
{n:51,cat:"高速公路",type:"io",q:"在高速公路上错过了出口，应该怎么做？",i:"U 形掉头",ii:"继续行驶到下一个出口",ans:"B",
 exp:"<b>I U 形掉头（错）：</b>高速公路上严禁掉头、倒车、穿越中央分隔带，极度危险且违法。<br><b>II 继续到下一个出口（对）：</b>错过出口就开到下一个出口再下、再绕回来。<br><b>结论：</b>选 B。<br>💡 高速错过出口，唯一正确做法：往前到下个出口。"},
{n:52,cat:"夜间驾驶",type:"io",q:"以下哪种情况使晚上的驾驶者暂时看不清？",i:"其他车辆的前灯所发出的刺眼强光",ii:"擦火柴点香烟发出的火焰",ans:"C",
 exp:"<b>I 对向车前灯强光（对）：</b>迎面车的刺眼车灯会让你瞳孔骤缩、产生短暂'眩目'，几秒看不清前方。<br><b>II 车内擦火柴/打火的火光（对）：</b>车内突然亮起的火光会让已适应黑暗的眼睛瞬间失去夜视、看不清外面。<br><b>结论：</b>两者都会，选 C。<br>💡 夜间任何强光（车外车内）都会瞬间致盲，要避免直视。"},
{n:53,cat:"夜间驾驶",type:"io",q:"在什么情况下使用低光（近光）灯？",i:"夜晚在市区",ii:"大雾或薄雾笼罩的天气",ans:"C",
 exp:"<b>I 夜晚在市区（对）：</b>市区有路灯、车多人多、会车频繁，用近光灯，避免远光晃别人。<br><b>II 大雾/薄雾（对）：</b>雾天开远光，光会被水汽反射回来形成白茫茫一片更看不清，应改近光。<br><b>结论：</b>选 C。<br>💡 市区、雨雾天一律用近光。"},
{n:54,cat:"夜间驾驶",type:"io",q:"如靠近的车辆驾驶者没微亮低光灯怎么办？",i:"看着前面的路，避免直视其他车辆的灯光",ii:"快速地闪亮前灯一次提示",ans:"C",
 exp:"<b>I 看前面的路、避免直视对方灯（对）：</b>把视线移到自己车道右侧、用余光保持方向，别被对方远光晃到。<br><b>II 快速闪一下前灯提示（对）：</b>可短暂闪一下大灯，礼貌提醒对方关掉远光。<br><b>结论：</b>两者都可做，选 C。<br>💡 被对向远光晃：看右侧白线 + 闪灯提示，别用远光对射。"},
{n:55,cat:"夜间驾驶",type:"mc",q:"夜晚在高速行驶，何时不能使用高光（远光）灯？",opts:["为转弯而减速时","在没有中央分界带的路上行驶时","在下坡行驶时","跟着另一辆汽车时"],ans:"D",
 exp:"<b>正确 D（跟着另一辆车时）：</b>跟在前车后面（或与对向车会车）时，远光会从前车后视镜直射司机眼睛、造成眩目，必须切换近光。<br><b>逐项：</b>A 减速转弯、B 无中央分隔路、C 下坡，这些情况下若前方/对向无车，一般仍可用远光。<br>💡 只要前方有车（跟车或会车），就关远光。"},
{n:56,cat:"恶劣天气",type:"io",q:"开车时下细雨，应该怎办？",i:"减速慢行，因雨使路面油垢泥沙溶解，使路更滑",ii:"保持正常跟随前车 2 倍的距离",ans:"C",
 exp:"<b>I 减速，因雨使油污泥沙泛起更滑（对）：</b>初下雨时路面油污、灰尘被水带起形成滑膜，附着力下降，必须减速。<br><b>II 跟车距离加到平常 2 倍（对）：</b>湿滑路面刹车距离变长，跟车距离要相应加倍。<br><b>结论：</b>选 C。<br>💡 雨天=减速 + 车距加倍。"},
{n:57,cat:"恶劣天气",type:"mc",q:"何时路面会更滑？",opts:["路刚刚铺好","刚开始下雨或细雨","下雨几小时后","特冷或干燥天气"],ans:"B",
 exp:"<b>正确 B（刚开始下雨或细雨时）：</b>刚下雨的头十几分钟，雨水还没把路面油污冲走，水和油污混成最滑的一层膜，此时抓地力最差。<br><b>逐项：</b>C 下久后油污被冲走反而好些；D 干燥天气不滑；A 新铺路面不必然滑。<br>💡 最危险的是'刚开始下雨'那会儿。"},
{n:58,cat:"恶劣天气",type:"mc",q:"在浓雾中驾驶，应该…",opts:["靠右行驶","减慢速度","紧跟前面的车辆","打开停车灯"],ans:"B",
 exp:"<b>正确 B（减慢速度）：</b>浓雾里能见度极低，第一要务是大幅减速，留出足够的发现和反应距离。<br><b>逐项：</b>C 紧跟前车一旦它急停就追尾；D 停车灯是停车用、不是行驶照明；A 靠右不是关键。<br>💡 浓雾=慢，配合近光/雾灯。"},
{n:59,cat:"恶劣天气",type:"mc",q:"白天在雨中行驶，应该使用…",opts:["停车灯","车前低光（近光）灯","四面闪光灯","车前高光（远光）灯"],ans:"B",
 exp:"<b>正确 B（近光灯）：</b>白天下雨开'近光灯'，既照亮前方，又让别的车更容易看见你；远光会被雨幕反射产生眩光。<br><b>逐项：</b>停车灯/双闪是停车、紧急时用，不是行驶常态。<br>💡 雨天即使白天也要开近光，关键是'让别人看见你'。"},
{n:60,cat:"恶劣天气",type:"mc",q:"在硬底（干燥硬质）路面上正常行驶，需要…",opts:["轮胎带上链条","车辆装雪胎","轮胎气压比平时略低","汽车行李箱装重货"],ans:"A",
 exp:"<b>原卷答案 A（轮胎带链条）。</b><br>⚠ 本题原卷答案存在争议：在干燥、坚硬的正常路面上行驶，<b>并不需要</b>防滑链或雪胎——干路装链条反而损坏路面和轮胎，链条/雪胎只在冰雪路面才用。<br><b>应试建议：</b>考试按原卷记 A 即可，现实里请勿在干路上装链条。"},
{n:61,cat:"恶劣天气",type:"io",q:"驾驶手排车辆从很滑路面开车时应…",i:"用二档或二档以上高档起步",ii:"迅速加速",ans:"A",
 exp:"<b>I 用二档或更高档起步（对）：</b>滑路上用较高挡位起步，能减小传到车轮的驱动力，降低车轮空转打滑的风险。<br><b>II 迅速加速（错）：</b>猛加油会让车轮瞬间空转、失去抓地而打滑。<br><b>结论：</b>选 A。<br>💡 冰雪/湿滑起步：高一档、轻给油、慢慢来。"},
{n:62,cat:"紧急故障",type:"io",q:"拉着拖车下陡坡时，应该…",i:"使用低档",ii:"保持在右边车道行驶",ans:"C",
 exp:"<b>I 使用低档（对）：</b>拖挂重物下坡，用低档让发动机帮忙制动，防刹车过热失灵。<br><b>II 保持在右车道（对）：</b>带拖车速度慢，应靠右行驶，把左侧让给快车。<br><b>结论：</b>选 C。<br>💡 拖车下坡：低档控速 + 靠右慢行。"},
{n:63,cat:"紧急故障",type:"io",q:"如果刹车失灵，应该…",i:"换低档",ii:"使用紧急（手）刹车",ans:"C",
 exp:"<b>I 换低档（对）：</b>逐级降到低档，用发动机制动帮助减速。<br><b>II 使用紧急（手）刹车（对）：</b>缓慢拉起手刹辅助制动（别猛拉以免甩尾）。<br><b>结论：</b>两招并用，选 C。<br>💡 刹车失灵别慌：降档 + 缓拉手刹 + 找安全处蹭停。"},
{n:64,cat:"恶劣天气",type:"io",q:"怎样使湿的刹车变干？",i:"打开暖气",ii:"换低档、轻踩刹车",ans:"B",
 exp:"<b>I 打开暖气（错）：</b>车内暖气和车轮处的刹车片干湿毫无关系。<br><b>II 换低档、轻踩刹车（对）：</b>低速行驶中轻轻、反复带一下刹车，靠摩擦产生的热把刹车片上的水烘干、恢复制动力。<br><b>结论：</b>选 B。<br>💡 过水后刹车变软：低速轻点几下刹车把它'焐干'。"},
{n:65,cat:"紧急故障",type:"io",q:"在高速行驶时，轮胎爆破，应该…",i:"发现爆胎之后立刻踩牢刹车",ii:"握紧驾驶盘防偏向、松掉油门、慢慢驶出路面",ans:"B",
 exp:"<b>I 立刻踩牢刹车（错）：</b>高速爆胎时急刹，车会因左右制动力不均急剧跑偏甚至翻车。<br><b>II 握紧方向防偏、松油门、慢慢驶出路面（对）：</b>双手稳住方向盘别让车跑偏，缓缓松油门让车自然减速，再慢慢靠边停下。<br><b>结论：</b>选 B。<br>💡 爆胎口诀：稳方向、松油门、慢靠边，<b>千万别急刹</b>。"},
{n:66,cat:"紧急故障",type:"io",q:"换漏气轮胎时，应该…",i:"用空档",ii:"锁住车轮（拉手刹/垫块）",ans:"B",
 exp:"<b>I 用空档（错）：</b>挂空档车会自由溜动，换胎时很危险。<br><b>II 锁住车轮（对）：</b>换胎前必须固定车辆——拉紧手刹、并在对角车轮处垫上挡块，防止车滑动。<br><b>结论：</b>选 B。<br>💡 换胎先固定：手刹拉死 + 垫块挡轮。"},
{n:67,cat:"紧急故障",type:"io",q:"夜晚，车在高速公路上发生故障，应该…",i:"将车安全停在路外",ii:"开高光（远光）灯",ans:"A",
 exp:"<b>I 把车安全停到路外（对）：</b>尽量把车移出行车道、停到路肩护栏外，远离车流。<br><b>II 开远光灯（错）：</b>停在路边开远光会直射来车司机、造成眩目，应开'危险报警闪光灯（双闪）'。<br><b>结论：</b>选 A。<br>💡 路边故障开双闪，不是远光。"},
{n:68,cat:"紧急故障",type:"io",q:"夜晚，车在高速公路上发生故障，应该…",i:"支起车盖，白手巾绑在车左门把手",ii:"打开停车灯或危险灯",ans:"D",
 exp:"<b>原卷答案 D（I、II 皆非）。</b><br><b>I 支起车盖、白布绑左门把手：</b>白手巾是<b>白天</b>用的求助信号，<b>夜里根本看不见</b>，而且在靠车流的左门侧操作很危险，所以夜间不适用。<br><b>本卷思路：</b>夜间高速抛锚的首要动作是先把车安全停到路外（见第 67 题），原卷认为这两项都不是夜间该做的首选，故判'皆非'。<br>⚠ 争议：II'打开危险灯/双闪'在现实中是<b>正确且必须</b>的，按真实驾驶 II 应算对。应试请按原卷记 <b>D</b>，但现实里夜间抛锚务必开双闪。"},
{n:69,cat:"紧急故障",type:"mc",q:"如果车被开到路肩上，应该…",opts:["立刻换低档","不断踩牢刹车","使用紧急刹车","将脚慢慢离开油门"],ans:"D",
 exp:"<b>正确 D（脚慢慢离开油门）：</b>两个轮子压上松软路肩时，猛打方向想拽回路面、或急踩刹车，都会让车瞬间失稳甚至翻车；正确做法是缓缓松油门让车减速，握稳方向，等速度降下来再平缓地把车开回路面。<br><b>逐项：</b>A 急换档、B/C 急刹/紧急刹车都会让车失控。<br>💡 压到路肩别急打方向、别急刹，慢慢收油稳住。"},
{n:70,cat:"恶劣天气",type:"io",q:"哪种路面容易发生打滑？",i:"冰雪淤积的路面",ii:"刚刚铺设的路面",ans:"A",
 exp:"<b>I 冰雪淤积的路面（对）：</b>冰雪让轮胎几乎没有抓地力，是最容易打滑的路面。<br><b>II 刚铺设的路面（错）：</b>新铺路面本身不一定滑。<br><b>结论：</b>选 A。<br>💡 冰雪路最滑，要装雪胎/链条并大幅减速。"},
{n:71,cat:"恶劣天气",type:"mc",q:"如果不得不在结冰的路面上停车，应该…",opts:["使用手刹器","用力踩刹车器","猛然多次使用刹车器","轻踩刹车器"],ans:"D",
 exp:"<b>正确 D（轻踩刹车器）：</b>在冰面上必须非常轻柔地、点着踩刹车，防止车轮抱死后失去转向、打滑。<br><b>逐项：</b>B 用力踩、C 猛踩多次都会让车轮抱死打滑；A 在冰面拉手刹也易让后轮甩尾。<br>💡 冰面刹车=轻、柔、点着来。"},
{n:72,cat:"恶劣天气",type:"io",q:"车开始打滑时候，应该…",i:"把驾驶盘转向车尾打滑的方向",ii:"减轻踩油门的压力",ans:"C",
 exp:"<b>I 方向盘转向车尾打滑的方向（对）：</b>车尾往哪边滑，方向盘就往哪边轻打，顺势把车身'拉'正（即'顺打方向'）。<br><b>II 减轻油门压力（对）：</b>同时松开油门，让车自然减速恢复抓地。<br><b>结论：</b>选 C。<br>💡 打滑：顺着车尾方向修方向 + 松油门，<b>切忌猛踩刹车</b>。"},
{n:73,cat:"紧急故障",type:"io",q:"驾驶者卷入车祸时，应该…",i:"立刻和最近的法律施行部门报告",ii:"正式通知自己的保险公司",ans:"C",
 exp:"<b>I 向最近的执法部门报告（对）：</b>发生事故要立即报警/通知最近的执法机构。<br><b>II 通知自己的保险公司（对）：</b>之后要正式向自己的保险公司报案。<br><b>结论：</b>两件都要做，选 C。<br>💡 出事=先报警、再报保险。"},
{n:74,cat:"交通信号",type:"io",q:"在交叉路上，红色交通闪灯代表什么？",i:"减速慢行，小心通过",ii:"只有在把优先权让给别人时才停车",ans:"D",
 exp:"<b>I 减速慢行小心通过（错）：</b>这其实是'黄色闪灯'的含义，不是红色。<br><b>II 只在让行时才停车（错）：</b>红色闪灯要求你<b>每次都必须完全停车</b>，停稳后确认安全再走，不是'只有要让别人时才停'。<br><b>结论：</b>两项都说错，选 D。<br>💡 红色闪灯=当成 STOP 停车牌，必停；黄色闪灯=减速小心。"},
{n:75,cat:"交通信号",type:"mc",q:"在交叉路上，黄色交通闪灯代表什么？",opts:["不准右转","让优先权","不准左转","减速慢行，小心通过"],ans:"D",
 exp:"<b>正确 D（减速慢行、小心通过）：</b>黄色闪灯是警示信号，提醒前方需注意，减速、提高警惕通过即可，不必停车。<br><b>逐项：</b>它不涉及禁止转弯(A/C)，也不等于'让行'标志(B)。<br>💡 红闪要停、黄闪减速——配对记。"},
{n:76,cat:"交通信号",type:"io",q:"菱形交通标志用来警告驾驶者进入哪些危险区？",i:"火车平交道",ii:"鹿出没区",ans:"B",
 exp:"<b>I 火车平交道（错）：</b>火车道的提前警告是'圆形黄牌（里面 X 和 RR）'，道口本身是交叉木牌(crossbuck)，都不是菱形。<br><b>II 鹿出没区（对）：</b>'前方有鹿/动物出没'用的是菱形黄色警告牌。<br><b>结论：</b>只有 II 对，选 B。<br>💡 菱形=一般危险警告（动物、弯道、施工等）；铁道口是圆牌。"},
{n:77,cat:"交通信号",type:"mc",q:"菱形交通标志象征？",opts:["不准左转","让优先权","完全停车","减速慢行，小心通过"],ans:"D",
 exp:"<b>正确 D（减速慢行、小心通过）：</b>菱形（黄底黑图）属'警告类'标志，统一含义是：前方有危险，减速、当心、小心通过。<br><b>逐项：</b>禁令类是红圈/红斜杠，停车是八角红牌，让行是倒三角，都不是菱形。<br>💡 形状记忆：菱形=警告、八角=停、倒三角=让。"},
{n:78,cat:"交通信号",type:"io",q:"什么情况下可以忽视警察的指挥？",i:"当紧急车辆接近时",ii:"当警察跟交通信号发生冲突时",ans:"D",
 exp:"<b>I 紧急车辆接近（错）/ II 警察与信号冲突（错）：</b>警察的现场手势指挥拥有<b>最高</b>效力，任何情况下都不能无视——即便信号灯是绿的，警察让你停你就得停。<br><b>结论：</b>两种都不能无视警察，选 D。<br>💡 优先级：警察 > 信号灯 > 标志 > 标线。"},
{n:79,cat:"交通信号",type:"mc",q:"高速公路施工地带标志的主要颜色是…",opts:["红色","白色","橙色","绿色"],ans:"C",
 exp:"<b>正确 C（橙色）：</b>道路施工/养护区域的标志牌、锥桶、指示统一用'橙色'，提醒前方有施工、需高度警惕。<br><b>颜色体系：</b>警告=黄、施工=橙、指路=绿、禁令/停车=红、服务=蓝。<br>💡 看见橙色=前方施工，减速避让工人。"},
{n:80,cat:"行人自行车",type:"io",q:"在没有交通信号灯的交叉路口，什么情况下法律给予盲人的特权有效？",i:"只有一个人的时候",ii:"如果拿着白色红贴的拐杖或有盲人犬引路",ans:"B",
 exp:"<b>题意：</b>盲人过街时享有'绝对先行权'（所有车必须停下让他先走）。问的是：这个特权<b>在什么条件下才生效</b>？<br><b>关键：</b>司机光看人未必看得出谁是盲人，所以法律规定——只有盲人<b>亮明身份</b>时特权才生效。<br><b>I 只有一个人时（错）：</b>'路上有几个人'和盲人有没有先行权<b>毫无关系</b>，纯属干扰项。<br><b>II 持白色红端拐杖或有导盲犬（对）：</b>白色（带红端）盲杖、导盲犬就是公认的'我是盲人'标志，司机看到必须停车让行——这正是触发特权的条件。<br><b>结论：</b>选 B。<br>💡 见到白杖/导盲犬，无条件停车让行，不管周围有几个人。"},
{n:81,cat:"行人自行车",type:"io",q:"以下哪项关于小孩骑自行车的描述是正确的？",i:"必须面对车流骑自行车",ii:"他们在几乎所有情况下跟车擦碰都会严重致伤",ans:"B",
 exp:"<b>I 必须面对车流骑车（错）：</b>自行车被视为'车辆'，应当与机动车<b>同方向（顺行）</b>骑，不是面对车流。<br><b>II 几乎任何擦碰都会重伤（对）：</b>骑车人没有车身保护，哪怕被轻微剐蹭也极易重伤。<br><b>结论：</b>选 B。<br>💡 再记：走路逆行（面对车）、骑车顺行（同向）——对照第 11 题。"},
{n:82,cat:"车辆保养",type:"mc",q:"在北卡，每辆车需要有什么样的必需品？",opts:["车牌照灯","门下灯","侧灯","倒退灯"],ans:"A",
 exp:"<b>正确 A（车牌照灯）：</b>夜间必须能照亮后车牌让人看清，所以'车牌照明灯'是法律规定的必备装置。<br><b>逐项：</b>门下灯、侧灯、倒车灯不是强制必备的法定必需品。<br>💡 牌照灯=法定必备，夜里要亮。"},
{n:83,cat:"车辆保养",type:"mc",q:"刹车器在什么时候需要检查？",opts:["车内有很强烈的汽油味","引擎在停车信号灯熄火","阵风吹来时很难控制车辆","踩刹车器时出现擦擦声"],ans:"D",
 exp:"<b>正确 D（踩刹车时出现擦擦声）：</b>踩刹车时听到金属'擦擦/吱吱'声，通常是刹车片磨到极限、该换了，必须立即检查刹车系统。<br><b>逐项：</b>A 浓汽油味是燃油系统问题；B 红灯熄火是怠速/点火问题；C 阵风难控是车身/侧风问题，都不是刹车信号。<br>💡 刹车异响=刹车片报警，赶紧查。"},
{n:84,cat:"车辆保养",type:"io",q:"以下关于喇叭和警报器的陈述，哪个正确？",i:"有执照的车辆必须有喇叭",ii:"只有警察车和紧急车辆可以装有警报器",ans:"C",
 exp:"<b>I 有照车辆必须有喇叭（对）：</b>合法上路的车都必须装配可用的喇叭。<br><b>II 只有警车和紧急车辆能装警报器（对）：</b>警笛只允许警车、救护车、消防车等紧急车辆安装使用，普通车装警笛违法。<br><b>结论：</b>选 C。<br>💡 喇叭人人要，警笛只属紧急车。"},
{n:85,cat:"车辆保养",type:"mc",q:"每个车辆必须装有……",opts:["消音器","四层厚轮胎","挡泥板","安全带"],ans:"D",
 exp:"<b>正确 D（安全带）：</b>安全带是强制法定装备，任何车辆都必须配备、乘员都必须系。<br><b>逐项：</b>消音器、挡泥板视车型/路况要求，'四层厚轮胎'不是法定标准。<br>💡 安全带=保命+法定，必装必系。"},
{n:86,cat:"车辆保养",type:"mc",q:"从引擎到车尾承受并消除有害气体的部分叫做…",opts:["点火装置","燃料装置","车体支持装置","排气装置"],ans:"D",
 exp:"<b>正确 D（排气装置）：</b>从发动机到车尾、负责承接并把废气排出车外（并降噪、净化）的系统就是'排气系统'。<br><b>逐项：</b>点火装置负责点燃混合气、燃料装置负责供油、车体支撑装置是悬挂，都不是排废气的。<br>💡 废气走排气管=排气系统。"},
{n:87,cat:"车辆保养",type:"mc",q:"容易漏的排气装置必须修理，因为…",opts:["浪费汽油和机油","使引擎过热","会使毒气进入车内","使引擎很难启动并可能熄火"],ans:"C",
 exp:"<b>正确 C（毒气进入车内）：</b>排气系统漏气，会让含一氧化碳(CO)等的有毒废气渗进车厢；一氧化碳无色无味、可致人昏迷死亡，所以必须立即修理。<br><b>逐项：</b>A/B/D 描述的费油、过热、难启动都不是排气泄漏最危险的后果。<br>💡 排气漏=要命的一氧化碳，马上修。"},
{n:88,cat:"车辆保养",type:"mc",q:"正常行驶时车身摇动并在转向时向一边倾斜，是哪部分有故障？",opts:["点火装置","驾驶盘","刹车器","车体支持（悬挂）装置"],ans:"D",
 exp:"<b>正确 D（车体支撑/悬挂系统）：</b>正常行驶却车身发抖、过弯时异常向一侧倾斜，通常是减震器、弹簧等'悬挂（车体支撑）系统'出了问题。<br><b>逐项：</b>点火、方向盘、刹车故障各有别的症状（熄火、跑偏、异响），不会主要表现为车身摇晃倾斜。<br>💡 车身晃/侧倾=查悬挂减震。"},
{n:89,cat:"校车平交道",type:"mc",q:"五个车线的路面上，校车停最右车线上下乘客，哪些车辆需停车？",opts:["所有车线上的车辆","与校车同方向的车辆","与校车相反方向的车辆","只有转弯车线上的车辆"],ans:"B",
 exp:"<b>正确 B（与校车同方向的车辆）：</b>在没有实体中央分隔的多车道路上，校车停靠上下学生时，与它<b>同方向</b>的所有车道车辆都必须停车等待，直到校车收起停车臂、关掉红灯。<br><b>逐项：</b>若道路中间有实体隔离带，相反方向的车可以不停。<br>💡 校车下客：同向必停，有隔离带的对向可不停。"},
{n:90,cat:"校车平交道",type:"mc",q:"学校车在北卡州的最高时速为…",opts:["55 英里","45 英里","35 英里","25 英里"],ans:"B",
 exp:"<b>正确 B（45 英里）：</b>北卡普通校车的最高时速为 45 英里。<br><b>对比记忆：</b>普通校车 45、学校课外活动车 55（见第 21 题），别搞混。<br>💡 校车 45、活动车 55。<br>🎵 口诀：校车顶速四十五。"},
{n:91,cat:"安全驾驶",type:"mc",q:"驾车的安全速度是…",opts:["视当时天气、路面情况而定","视驾驶者技术而定","标示的限制车速","低于标示的限制车速"],ans:"A",
 exp:"<b>正确 A（视天气、路况而定）：</b>限速牌上的数字只是'法定上限'，真正的'安全速度'要根据当时天气、能见度、路面湿滑、车流密度随时调整——雨雪雾天要远低于限速。<br><b>逐项：</b>C/D 把固定数值当安全速度，忽略了实际情况。<br>💡 安全车速没有固定数，看路况说话。"},
{n:92,cat:"校车平交道",type:"mc",q:"当你通过火车平交道时，应该…",opts:["停车看两边，安全后通过","不需要停车","不需要停车，但要两边看","信号灯亮起时赶紧冲过去"],ans:"A",
 exp:"<b>正确 A（停车看两边，安全后通过）：</b>通过铁道口要减速乃至停车，左右仔细观察、确认没有火车驶来，再通过，绝不抢行。<br><b>逐项：</b>D 信号灯一亮就说明火车将至，抢着冲过去极其危险。<br>💡 过铁道：停、看、听，确认无车再走。"},
{n:93,cat:"安全驾驶",type:"mc",q:"为何在乡间小路要慢速行车？",opts:["因有牛通过","因有农耕（农机）车","因路面太少","因有小孩玩耍"],ans:"B",
 exp:"<b>正确 B（因有农耕/农机车）：</b>乡间小路就是农田区，最典型的危险是慢速行驶、又会突然从田里拐进拐出的农用机械（拖拉机、收割机）；开快极易追尾，所以要减速慢行——这是手册针对'乡间道路'专门强调的危险。<br><b>逐项排除：</b>A 牛通过=开放牧场区才特别强调；C 路面太少=说法含糊、非核心原因；D 小孩玩耍=那是<b>住宅区</b>的典型危险（见第 117 题），不是乡间路考点。<br>💡 本题是'挑教材标准原因'：乡村路=慢吞吞的农机出没，减速防追尾。"},
{n:94,cat:"转弯车道",type:"mc",q:"转弯或过车道前，除亮转弯灯和看侧镜外，还要？",opts:["打手势","看后镜","加速","头转过来看盲点"],ans:"D",
 exp:"<b>正确 D（头转过来看盲点）：</b>后视镜和侧镜都存在看不到的'盲区'，转弯或变道前，除了打灯、看镜，还必须扭头快速瞄一眼车侧后方的盲点，确认没有车/摩托/自行车再动。<br><b>逐项：</b>打手势(A)、看后镜(B)都不能消除盲区；加速(C)更危险。<br>💡 变道三步：打灯→看镜→扭头看盲点。"},
{n:95,cat:"安全驾驶",type:"mc",q:"何时需要戴安全带？",opts:["当开长途车时","在任何情况下，驾车者与乘客都要","当在高速公路上开车时","当有危险时"],ans:"B",
 exp:"<b>正确 B（任何情况下驾驶者与乘客都要）：</b>不分路程长短、不分高速市区、不分有没有危险，只要车在动，驾驶员和乘客都必须系好安全带。<br><b>逐项：</b>A/C/D 把它限定在某些场合，都不对。<br>💡 上车就系，无一例外。"},
{n:96,cat:"驾照制度",type:"mc",q:"身体虚弱开车、危险驾驶被判有罪，处罚是？",opts:["失去驾照","罚款 250 元以下","罚款 500 元以下","坐牢 30 天"],ans:"A",
 exp:"<b>正确 A（失去驾照）：</b>按本卷口径，明知身体状况不适仍危险驾驶并被判有罪，后果是被吊销/失去驾照。<br>💡 身体不适别硬开，出事后果很重。"},
{n:97,cat:"停车规定",type:"mc",q:"你在消防栓旁边停车，规定最少距离多少？",opts:["15 尺","9 尺","12 尺","6 尺"],ans:"A",
 exp:"<b>正确 A（15 尺）：</b>停车时车身距消防栓必须至少 15 英尺（约 4.5 米），确保消防车随时能接上水带取水。<br>💡 消防栓前后各留 15 尺，别挡。<br>🎵 口诀：消防栓边十五尺（约 4.5 米），让路给消防。"},
{n:98,cat:"酒精药物",type:"mc",q:"一位司机因病服药应？",opts:["驾驶前阅读药物说明","只在白天驾驶","改为喝酒","断续驾驶"],ans:"A",
 exp:"<b>正确 A（驾驶前阅读药物说明）：</b>很多药物会引起嗜睡、头晕、反应迟钝，开车前应先读说明书、确认是否影响驾驶（写明'服用后勿驾驶/操作机械'的就别开）。<br><b>逐项：</b>C'改为喝酒'更糟（酒+药互相增强，见第 119 题）。<br>💡 吃药先看说明，含致困成分别开车。"},
{n:99,cat:"酒精药物",type:"mc",q:"未满 21 岁的青年血液中被证实含有酒精，将如何？",opts:["被吊销驾照 30 天","被吊销驾照 60 天","被吊销驾照 6 个月","被吊销驾照 12 个月"],ans:"D",
 exp:"<b>正确 D（吊照 12 个月）：</b>北卡对未满 21 岁实行'零容忍'：血液里查出<b>任何</b>浓度的酒精，就吊销驾照 12 个月。<br><b>对照成年人(21+)：</b>成年人有醉驾线 <b>0.08%</b>——低于且未受影响一般不违法；达到 0.08%+ 才算醉驾(DWI)，先当场吊照 30 天（见第 27 题），定罪后吊照 1 年并可能罚款+坐牢（见第 136 题）。拒测则不分年龄都吊 12 个月（见第 2 题）。<br>💡 未成年=滴酒不能沾(查出即吊一年)；成年=别到 0.08%。<br>🎵 口诀：未满廿一，沾酒就吊一整年（12 个月）。"},
{n:100,cat:"安全驾驶",type:"mc",q:"跟车的安全距离最少是？",opts:["两车身长度","三车身长度","两秒钟行车距离","三秒钟行车距离"],ans:"C",
 exp:"<b>正确 C（两秒钟行车距离）：</b>用'两秒法则'最科学：前车经过某固定参照物（路牌、树）时开始默数'1001、1002'，你到达同一点不少于两秒就算安全（雨雪天加倍到 3–4 秒）。<br><b>逐项：</b>用'几个车身'衡量会随车速失真——速度越快需要的距离越长。<br>💡 跟车看'秒'不看'车身'：晴天 2 秒、恶劣天气加倍。<br>🎵 口诀：跟车数两秒，雨天翻一倍。"},
{n:101,cat:"停车规定",type:"mc",q:"车停在路边，规定离开边石最多不得超过多少？",opts:["18 英尺","12 英尺","15 英尺","6 英尺"],ans:"D",
 exp:"<b>原卷答案 D。</b><br>⚠ 本题原卷用'英尺'出题、选项偏差较大：现实规则是平行停车后，车身距路缘石不超过约 <b>12 英寸（≈1 英尺，约 0.3 米）</b>，并非好几英尺。<br><b>应试建议：</b>按原卷记 D；实际停车请尽量贴近路缘（约一拳距离）。<br>🎵 口诀：贴边停、一拳内；原卷 6 英尺≈1.8 米。"},
{n:102,cat:"超车",type:"mc",q:"你在什么时候绝对不得超车？",opts:["在他车右转弯时","在他车停在人行道前让行人时","在他车开进私人车道时","在他车左转弯时"],ans:"B",
 exp:"<b>正确 B（他车停在人行道前让行人时）：</b>前车之所以停下，是因为有行人正在过马路；此时你从旁超车，很可能撞上被前车挡住、你看不见的行人，所以绝对禁止。<br><b>逐项：</b>A/C/D（前车右转、进私车道、左转）在确保安全时未必禁止超越。<br>💡 前车停下让人，你也必须停，绝不能超。"},
{n:103,cat:"驾照制度",type:"mc",q:"驾照借给未满 21 岁青年去买酒，你的驾照将被吊销多久？",opts:["30 天","90 天","6 个月","12 个月"],ans:"D",
 exp:"<b>正确 D（吊照 12 个月）：</b>把自己的驾照借给未满 21 岁的人去买酒，属于协助未成年违法饮酒，本人驾照被吊销 12 个月。<br>💡 证件别乱借，帮未成年买酒后果严重。<br>🎵 口诀：借证买酒，连累自己吊一年。"},
{n:104,cat:"路权",type:"mc",q:"何时你才有'路权'（Right of Way）？",opts:["你从一条私人车路开出来","你从停车场开出来","你已经在交通主道上","你正要开进交叉路口"],ans:"C",
 exp:"<b>正确 C（你已经在交通主道上）：</b>已经行驶在主干车流中的车辆享有'路权（先行权）'；反之，从私人车道、停车场、支路'驶入'主道的车，都没有路权、必须让行。<br><b>逐项：</b>A/B/D 都是'正要汇入/进入'的一方，要让别人。<br>💡 已经在路上的有路权，往里挤的要让。"},
{n:105,cat:"安全驾驶",type:"mc",q:"农耕车辆应如何在公路上行驶？",opts:["视农机马力而定","时速保持 15–20 英里/小时","时速保持 35 英里/小时","时速保持 10 英里以下"],ans:"B",
 exp:"<b>正确 B（15–20 英里/小时）：</b>按本卷口径，农用机械在公路上以约 15–20 英里/小时的低速行驶，后方车辆要耐心等到安全时机再超越。<br>💡 农机慢（15–20），遇到别催，安全再超。<br>🎵 口诀：农机慢爬，十五到二十。"},
{n:106,cat:"酒精药物",type:"mc",q:"酒精对你的驾驶能力有多大影响？",opts:["减低控制力，但不妨碍判断力","饮酒太多妨害视力","反应太快，因而妨害判断力","反应迟钝，妨害视力及判断力"],ans:"D",
 exp:"<b>正确 D（反应迟钝，妨害视力及判断力）：</b>酒精会全面削弱驾驶能力——让反应变慢、视力变差（视野变窄、对光适应差）、判断力下降，是综合性损害。<br><b>逐项：</b>A/B/C 只说了一部分，且 C 把'反应'说成'太快'是错的（酒精使反应变慢）。<br>💡 酒精=反应慢 + 看不清 + 判断差，三样一起坏。"},
{n:107,cat:"酒精药物",type:"mc",q:"所谓化学测验和呼吸分析器是用来测量？",opts:["血液中的含酒量","视力","驾驶能力","反应时间"],ans:"A",
 exp:"<b>正确 A（血液中的含酒量）：</b>化学检验（验血/验尿）和呼吸分析仪，目的都是测定你的'血液酒精浓度(BAC)'。<br><b>逐项：</b>它们不是测视力、不是测驾驶技术、也不是测反应时间。<br>💡 酒测=测 BAC（血液酒精含量）。"},
{n:108,cat:"安全驾驶",type:"mc",q:"想将车倒出车道，附近有小孩玩耍，应该如何？",opts:["按喇叭以警告小孩","走到车后查看，车道上确无小孩","告诉小孩走开","加速开动机器，警告小孩"],ans:"B",
 exp:"<b>正确 B（走到车后查看，确认无小孩）：</b>小孩个子矮，正好落在车尾盲区里，倒车前必须亲自下车绕到车后看一圈、确认车道上没有孩子和障碍，再上车倒。<br><b>逐项：</b>按喇叭(A)、喊话(C)、加速吓走(D)都不可靠，孩子未必走开。<br>💡 倒车有娃在附近：先下车看清车后，再倒。"},
{n:109,cat:"超车",type:"mc",q:"有他车超越你的车子，这时你该如何？",opts:["保持正常速度","加速前进","与他车相同速度","速度稍慢"],ans:"D",
 exp:"<b>正确 D（速度稍慢）：</b>当别人正在超你的车时，你应略微减速，给对方留出足够空间尽快、安全地完成超车并并回来。<br><b>逐项：</b>B 加速会让对方超不过去、被困在对向车道里；C 保持同速同样让它超不过，都很危险。<br>💡 别人超你时，松点油门让它过。"},
{n:110,cat:"酒精药物",type:"mc",q:"下面哪项血液含量（BAC）的解说是对的？",opts:["含酒量 0.05% 或以上表示驾驶能力受损","血液含酒量即你血液中含酒精的比率","血液含酒量 0.08% 即所谓'醉'","以上三条解说皆正确"],ans:"D",
 exp:"<b>A（对）：</b>BAC 0.05% 及以上，驾驶能力已明显受损。<br><b>B（对）：</b>BAC 就是'血液中酒精所占比率'这个定义。<br><b>C（对）：</b>BAC 达 0.08% 即达法定'醉驾'标准。<br><b>结论：</b>三条说法全部正确，选 D。<br>💡 记 BAC：0.05% 受损、0.08% 算醉。<br>🎵 口诀：零五受损、零八算醉。"},
{n:111,cat:"交通信号",type:"mc",q:"当驾驶时，听见救护车警报声时应？",opts:["减低车速，但看见救护车前不须停","一直开车，直到你看见救护车","加速并在下一交叉路口转弯","将车开至路边，直到确定救护车不在你所行街道上"],ans:"D",
 exp:"<b>正确 D（靠边停车，直到确定救护车不在你这条街）：</b>听到警笛要立即向右靠边、减速停下让行，等确认紧急车辆已驶过、或根本不在你这条路上，再继续行驶。<br><b>逐项：</b>A/B 不及时让行违法；C 加速抢在前面转弯很危险。<br>💡 听到警笛=靠右停、让它先过。"},
{n:112,cat:"超车",type:"mc",q:"如果你前面有一部慢驶农耕车，应如何？",opts:["可以超车","按喇叭","尽量靠近农耕车，等待机会超车","等农耕车靠边后，在安全情况下才通过"],ans:"D",
 exp:"<b>正确 D（等农机靠边后，安全时才通过）：</b>农机视野盲区大、随时可能转弯进田，应耐心跟随，等它主动靠边示意、且对向无来车时再安全超过。<br><b>逐项：</b>贴近它(C)进它盲区很危险，乱按喇叭(B)、随意超(A)都不妥。<br>💡 跟农机：保持距离、等它让、安全才超。"},
{n:113,cat:"酒精药物",type:"mc",q:"身体内负责氧化（排除）酒精的器官是？",opts:["脑部","心脏","肾脏","肝脏"],ans:"D",
 exp:"<b>正确 D（肝脏）：</b>进入体内的酒精绝大部分由'肝脏'代谢分解，且分解速度基本固定（约每小时一标准杯），喝咖啡、洗冷水澡、吹风、运动都<b>不能</b>加快，只能靠时间。<br>💡 醒酒唯一靠谱的办法是'等'，因为肝脏代谢速度是定的。"},
{n:114,cat:"驾照制度",type:"mc",q:"垃圾从窗口吹（扔）出去，司机将会被？",opts:["罚款","吊销驾照","没打伤人不要紧","坐牢"],ans:"A",
 exp:"<b>正确 A（罚款）：</b>向车窗外抛撒垃圾属违法乱丢废弃物，会被处以罚款（最低 250 元，见第 118 题）。<br>💡 车窗别乱扔东西，要罚钱。"},
{n:115,cat:"超车",type:"mc",q:"你在何时方能越过双重黄色直线？",opts:["在入私人车道或小巷时","超过一辆慢速度的农场用车","超过一辆慢速度的货车","情况许可时可超过任何车辆"],ans:"A",
 exp:"<b>正确 A（驶入私人车道或小巷时）：</b>双黄实线表示两个方向都严禁越线超车；唯一被允许越过它的情形，是为了拐进/拐出路边的私人车道或小巷而短暂跨线。<br><b>逐项：</b>B/C/D 都把双黄实线当成'可以超车'，全错——再慢的车也不能越双黄实线去超。<br>💡 双黄实线只为'进出私车道'可越，绝不为超车。"},
{n:116,cat:"转弯车道",type:"mc",q:"在闹市中你转弯前，离开多少尺就应该打讯号灯？",opts:["最少 60 尺","最少 150 尺","最少 200 尺","最少 250 尺"],ans:"C",
 exp:"<b>正确 C（最少 200 尺）：</b>按本卷口径，在闹市转弯前至少要提前 200 英尺（约 60 米）打开转向灯，给后车和行人足够的预判时间。<br>💡 转弯提前打灯，本卷标准 200 尺。<br>🎵 口诀：转弯打灯，提前两百尺（约 60 米）。"},
{n:117,cat:"行人自行车",type:"mc",q:"踩自行车最危险及发生意外最多的地方是？",opts:["在晚上","在高速公路","在农耕路段","住宅区"],ans:"D",
 exp:"<b>正确 D（住宅区）：</b>住宅区路口密、出入车道多、常有倒车和突然跑出来的儿童，是自行车发生意外最多的地方。<br>💡 住宅区骑车/开车都要特别慢、特别小心娃。"},
{n:118,cat:"驾照制度",type:"mc",q:"乱扔垃圾出车外的最低罚款是？",opts:["100 元","200 元","250 元","300 元"],ans:"C",
 exp:"<b>正确 C（250 元）：</b>按本卷口径，向车外乱扔垃圾的最低罚款是 250 元。<br>💡 乱扔垃圾最低罚 250。<br>🎵 口诀：车外乱扔垃圾，最低罚二五〇（250）。"},
{n:119,cat:"酒精药物",type:"mc",q:"喝酒同时又吃医生开方的药物会有何反应？",opts:["酒精会帮助药力治疗伤风","二者化合会加强酒精的反应","没有反应，因二者不同性质","药物会减低酒精的反应"],ans:"B",
 exp:"<b>正确 B（二者化合会加强酒精的反应）：</b>酒精和很多处方/非处方药会产生'叠加、增强'效应，把镇静、嗜睡、反应迟钝等副作用放大，对驾驶极其危险，甚至危及生命。<br><b>逐项：</b>说没反应(C)、说减弱(D)、说帮助治病(A)都错。<br>💡 吃药期间别喝酒——会'1+1>2'地放大危害。"},
{n:120,cat:"超车",type:"mc",q:"道路中间有条黄色实线和一条黄色断线，黄实线对着你这一边，你该如何？",opts:["情况许可可超车","不准超车","高速公路上可超过此线","只在驶近交叉路口时可超"],ans:"B",
 exp:"<b>正确 B（不准超车）：</b>路中一条黄实线 + 一条黄虚线时，规则是'看你这一侧是哪种线'：实线在你这边=你<b>不准</b>越线超车；虚线在哪边，哪边的车才可以超。题目说实线对着你，所以你不能超。<br>💡 口诀：实线禁、虚线行，看自己脚下那条线。"},
{n:121,cat:"高速公路",type:"mc",q:"高速公路入口线很短时，进入交通行列最安全的方法是？",opts:["逐渐加速让其他来车看见你","利用公路左线达到车速","等候较长的交通间隔，再立即加速进入","尽快利用入口加速道达到公路速度"],ans:"C",
 exp:"<b>正确 C（等较长的交通间隔，再立即加速汇入）：</b>当加速车道很短、来不及平顺并线时，最安全的做法是先观察主路车流，等出现一个足够大的空档，再果断加速插进去。<br><b>逐项：</b>硬挤(D)、占左道(B)、慢吞吞(A)都容易和主路车冲突。<br>💡 道太短就'等大空档 + 一脚加速'切进去。"},
{n:122,cat:"路权",type:"mc",q:"一般来说，如果交叉路口没有交通控制设备，哪一辆车有权先行？",opts:["正在右转弯的车","相反方向来的车","在你右边的车","在你左边的车"],ans:"C",
 exp:"<b>正确 C（在你右边的车）：</b>没有信号、没有标志的路口，若两车几乎同时到达，规则是'让右'——让你右手边的那辆车先行。<br>💡 同时到、让右边。"},
{n:123,cat:"路权",type:"mc",q:"当你驶进一交通被阻的交叉路口当应？",opts:["慢慢行驶直到前面交通向前移","停止在交叉路口外，直到你可以通过","尽量靠近其他车辆","按喇叭使前面的车向前开动"],ans:"B",
 exp:"<b>正确 B（停在路口外，直到能通过才进）：</b>前方拥堵、过去也会被堵在路口里时，要停在路口<b>外</b>等待，绝不能进入路口然后卡在中间、把横向交通全堵死。<br><b>逐项：</b>慢慢往里挪(A)、贴着前车(C)、按喇叭催(D)都会造成路口'死锁'。<br>💡 出不去就别进路口，免得堵死十字。"},
{n:124,cat:"酒精药物",type:"mc",q:"除酒精外，还有什么药物会影响驾驶能力？",opts:["过敏药","大麻","伤风药（凉药）","以上三个皆会"],ans:"D",
 exp:"<b>正确 D（以上三个皆会）：</b>过敏药、大麻、感冒药都可能引起嗜睡、头晕或反应迟钝，都会损害驾驶能力。<br>💡 不止酒精——很多药也会让你'不能开车'。"},
{n:125,cat:"交通信号",type:"mc",q:"当你驶近交叉路口，交通灯由绿色转成黄色，你该如何？",opts:["红灯快亮了，准备停车","在红灯亮前加快速度通过","立刻停止","停在路口中间等待绿灯"],ans:"A",
 exp:"<b>正确 A（红灯快亮了，准备停车）：</b>黄灯的含义是'红灯即将亮起'，是让你减速、准备停车的提醒（在能安全停下的前提下停车）。<br><b>逐项：</b>B 抢黄灯加速冲、C 一脚急停、D 停在路口中间，都危险。<br>💡 黄灯=准备停，不是'加速冲过去'。"},
{n:126,cat:"紧急故障",type:"mc",q:"下大雨时车身较低部分被水淹没、发动机停止，应如何重新发动？",opts:["把车匙转到发动位置定住至车发动","把油门踩下一半，然后再转匙发动","断续转匙发动","开暖气后再转匙发动"],ans:"B",
 exp:"<b>正确 B（油门踩一半，再转匙发动）：</b>按本卷口径，涉水熄火后保持一半油门、再尝试启动。<br>⚠ 现实提醒：车被水淹熄火后<b>千万不要反复打火</b>——一旦水被吸进气缸，强行启动会顶弯连杆、让发动机彻底报废，正确做法是别再点火、等待拖车救援。"},
{n:127,cat:"转弯车道",type:"mc",q:"当你等车在交叉路口中想左转时，应该…",opts:["若有车挡住则绕其他车后通过","打灯号，并将车轮打直（摆直）","闪你的车头灯让来车让你先过","打灯号，并将车轮转左"],ans:"B",
 exp:"<b>正确 B（打灯号，并将车轮摆直）：</b>在路口中央等待左转时，要打左转灯，同时把<b>前轮摆正（朝前）</b>。原因：万一被后车追尾，车会被向前推、停在原车道，而不会被推进对向车流被撞。<br><b>逐项：</b>D 提前把轮打向左，一旦被追尾就直接冲进对向，很危险。<br>💡 等左转：打灯+轮摆直，这是保命细节。"},
{n:128,cat:"高速公路",type:"mc",q:"高速公路的'加速小道'（Acceleration Lane）有何作用？",opts:["供货车进高速前试刹车","供驾驶人员进高速前加速到公路车速","供超过慢速车辆之用","供路客搭便车之用"],ans:"B",
 exp:"<b>正确 B（进高速前加速到公路车速）：</b>'加速车道'是让你在并入主路前，把车速提到和主路车流相近的速度，从而平顺、安全地汇入。<br><b>逐项：</b>它不是用来试刹车、超车或搭载乘客的。<br>💡 加速道=提速到车流速度再并线。"},
{n:129,cat:"超车",type:"mc",q:"当超车后，何时可以转回右线？",opts:["当打开转弯灯后","看到其他来车的头灯","打开车头灯后","从倒后镜中看见被超车辆的保险杠时"],ans:"D",
 exp:"<b>正确 D（从后视镜看见被超车辆的保险杠时）：</b>超车后别急着切回，要等你的后视镜里能完整看到被超车辆的<b>前保险杠</b>，说明你已和它拉开安全距离，这时再打右灯并回原车道才不会别到它。<br>💡 看见被超车的车头(保险杠)在镜中，才安全回线。"},
{n:130,cat:"交通信号",type:"mc",q:"在交叉路口有一红灯一绿色箭头的交通灯号，此时表示什么？",opts:["等绿灯再向任何方向前进","完全停住再向箭头所指方向前进","可向箭头所指方向小心前进，其他方向等绿灯","等绿灯再向箭头所指方向前进"],ans:"C",
 exp:"<b>正确 C（可向箭头方向小心前进，其他方向等绿灯）：</b>红灯亮、同时某方向的绿箭头也亮，表示<b>只允许</b>沿绿箭头所指方向小心通行（如专用左转/右转），其余方向仍要停等绿灯。<br>💡 绿箭头=该方向可走，红灯管其他方向。"},
{n:131,cat:"夜间驾驶",type:"mc",q:"在晚上如何减少对面车辆灯射来的光度？",opts:["看往方向盘的下缘","两眼转看本车道右边的白色行车线","戴浅色眼镜","打开你的远光去反射对方"],ans:"B",
 exp:"<b>正确 B（看本车道右边的白色行车线）：</b>会车被对向车灯晃到时，把视线移到自己车道<b>右侧的白色边线</b>上，用它保持方向、用余光照看前方，避免直视对方灯光。<br><b>逐项：</b>D 用自己的远光去'反射'对方=互相致盲，绝对错误。<br>💡 被晃就'看右白线'，别对射远光。"},
{n:132,cat:"路权",type:"mc",q:"你在私人车道开进大道时，应该如何？",opts:["让大道上所有车子先走","车身部分停在大路上引起注意","加快速度开上大路配合速度","不论大路有无车辆完全停止"],ans:"A",
 exp:"<b>正确 A（让大道上所有车先走）：</b>从私人车道驶出，你没有路权，必须等大路上所有车都过去、确认安全后，再汇入。<br><b>逐项：</b>车身探出去引人注意(B)、加速硬上(C)、不看车流就停死(D)都不对。<br>💡 出私车道=全程让行，安全才并入。"},
{n:133,cat:"停车规定",type:"mc",q:"你平行倒车进入两车之间，以后应该如何？",opts:["尽可能将车向前移动","前轮摆直，前后两车之间留些空位","倒车差不多碰到后面的车子","将前轮转向道路"],ans:"B",
 exp:"<b>正确 B（前轮摆直，前后留空位）：</b>平行停好后，把前轮回正（朝前），并和前后车都留出适当空隙，方便自己出库、也方便前后车进出。<br><b>逐项：</b>顶到前车(A)、贴死后车(C)、轮子打着角度(D)都不规范。<br>💡 停好回正前轮、前后留缝。"},
{n:134,cat:"紧急故障",type:"mc",q:"行驶中，刹车板突然下沉，如何应变？",opts:["断续踩压刹车，让它恢复弹性/压力","停止驾驶","转至空档、熄灭引擎","用脚尖把刹车板挑起"],ans:"A",
 exp:"<b>正确 A（断续连踩刹车，让它恢复弹性/压力）：</b>行驶中刹车踏板突然变软、往下沉，说明制动压力不足；此时快速、连续地反复踩踏板（'泵刹车'）有可能重新建立部分制动压力，同时配合降档、缓拉手刹一起减速。<br>💡 踏板发软=连踩'泵'回压力 + 降档手刹辅助。"},
{n:135,cat:"紧急故障",type:"mc",q:"因意外，汽车驶进水里，应如何逃生？",opts:["打开车门游水逃生","打开车窗游水逃生","留在车内等待蛙人拯救","放弃一切"],ans:"B",
 exp:"<b>正确 B（打开车窗游出）：</b>车落水后，车外水压会把车门死死压住、很难推开；正确做法是趁车还没沉、电路还能用时，尽快摇下或砸破<b>车窗</b>，从窗口游出去。<br><b>逐项：</b>开车门(A)往往打不开且会加速进水；等救援(C)/放弃(D)都会错过逃生时机。<br>💡 落水第一时间——开窗/破窗逃，别去拉车门。"},
{n:136,cat:"酒精药物",type:"mc",q:"醉酒或者吃药后驾驶会有何种后果？",opts:["罚款","坐监","吊销驾照","三者皆会"],ans:"D",
 exp:"<b>正确 D（三者皆会）：</b>酒后或服药后驾驶，可能同时面临罚款、监禁（坐牢）和吊销驾照三重处罚。<br>💡 酒驾/药驾=钱、牢、证一起赔。"},
{n:137,cat:"交通信号",type:"mc",q:"在公路上，指示驾驶人员进入适当路线转弯，是哪种设备？",opts:["闪烁红灯","路旁白色边线","闪烁黄灯","路上油漆白色箭头"],ans:"D",
 exp:"<b>正确 D（路上油漆的白色箭头）：</b>画在路面上的白色导向箭头，用来指引车辆提前进入正确的直行/转弯车道。<br><b>逐项：</b>闪红灯=停、闪黄灯=减速、路旁白边线=标示路边界，都不是'指引转弯车道'用的。<br>💡 地上的白箭头=告诉你该走哪条道。"},
{n:138,cat:"转弯车道",type:"mc",q:"你在转弯前，应该如何？",opts:["转弯前两车身距离时才使用讯号灯","周围看看，如果没有危险再行转弯","按喇叭等路口没有车辆再转弯","保持正常速度前进"],ans:"B",
 exp:"<b>正确 B（环顾四周，没危险再转弯）：</b>转弯前要先观察四周（含盲点）、确认没有行人和来车，安全了再转。<br><b>逐项：</b>A 离太近(两车身)才打灯太迟；C 非要等到完全无车不现实；D 保持原速不减速很危险。<br>💡 转弯=减速 + 打灯 + 看清四周 + 再转。"},
{n:139,cat:"紧急故障",type:"mc",q:"当发觉你驾驶之汽车散发浓烟，应如何处理？",opts:["浓烟会自动消散，无须理会","尽快选安全地点停车，马上离车寻找援助","不顾一切横冲直撞以待浓烟消散","致电回家询问原因"],ans:"B",
 exp:"<b>正确 B（尽快选安全地点停车，马上离车求援）：</b>车辆冒浓烟很可能是起火前兆，应立即在安全处靠边停车、关掉发动机、人员迅速离车到安全距离外，再寻求救援。<br><b>逐项：</b>不理会(A)、硬冲(C)、打电话回家(D)都会贻误逃生。<br>💡 冒烟=可能着火，先停车、先逃人。"},
{n:140,cat:"停车规定",type:"mc",q:"下列哪项即使是暂时停止，亦在禁止之列？",opts:["在公路桥梁上面","在车辆进出路口","火车平交道五十尺以内","消防栓前面"],ans:"A",
 exp:"<b>正确 A（公路桥梁上面）：</b>原卷答案取 A——桥上即使临时停车也禁止。<br>💡 现实中下列地方'即使临时停车'都禁止：公路桥上、车辆进出口、火车平交道 50 尺以内（约 15 米）、消防栓前——四处其实都不能停，记牢这一串。<br>🎵 口诀：桥上、路口、栓前、道五十（约 15 米）——临停也禁。"}
];

/* ====== 考点总结内容 ====== */
const SUMMARY = `<h2>📚 核心考点知识总结</h2>
<p class="stat">14 组高频考点，建议先看再刷题。点击展开。</p>`+Object.keys(KP).map((c,i)=>
 `<details class="kp"${i===0?' open':''}><summary>${c}</summary><ul><li>${KP[c].split('；').join('</li><li>')}</li></ul></details>`).join('');

/* ====== 错题本 ====== */
let wrong=[];try{wrong=JSON.parse(localStorage.getItem('nc_wrong')||'[]');}catch(e){}
let done=[];try{done=JSON.parse(localStorage.getItem('nc_done')||'[]');}catch(e){}
function markDone(n){if(!done.includes(n)){done.push(n);try{localStorage.setItem('nc_done',JSON.stringify(done));}catch(e){}updateProgress();}}
function updateProgress(){const t=DATA.length,d=done.length,p=t?Math.round(d/t*100):0;
  const lab=document.getElementById('progLabel');if(lab)lab.innerHTML='已完成 <b>'+d+'</b> / '+t+' 题 · '+p+'%'+(d>=t?' 🎉':'');
  const fill=document.getElementById('progFill');if(fill)fill.style.width=p+'%';}
function saveWrong(){try{localStorage.setItem('nc_wrong',JSON.stringify(wrong));}catch(e){}updateWrongCount();}
function addWrong(n){if(!wrong.includes(n)){wrong.push(n);saveWrong();}markCard(n,true);}
function removeWrong(n){const i=wrong.indexOf(n);if(i>=0){wrong.splice(i,1);saveWrong();}markCard(n,false);}
function markCard(n,on){const c=document.getElementById('q'+n);if(c)c.classList.toggle('iswrong',on);}
function updateWrongCount(){document.querySelector('[data-mode="wrong"]').textContent='📕 错题本 ('+wrong.length+')';}

/* ====== 测验状态 ====== */
let quiz={active:false,ids:[],ans:{}};

/* ====== 渲染题卡 ====== */
const listEl=document.getElementById('list');
function optionList(d){return d.type==='io'?ioOpts():d.opts.map((t,i)=>[['A','B','C','D'][i],t]);}
function buildCard(d){
  const card=document.createElement('div');card.className='q';card.dataset.cat=d.cat;card.id='q'+d.n;
  card.dataset.text=(d.q+' '+(d.i||'')+' '+(d.ii||'')+' '+(d.opts?d.opts.join(' '):'')).toLowerCase();
  if(wrong.includes(d.n))card.classList.add('iswrong');
  let h='<div class="head"><span class="num">'+d.n+'</span><span class="catflag">'+d.cat+'</span><span class="wrongbadge">📕 错过</span></div>';
  h+='<div class="stem">'+d.q+'</div>';
  if(d.type==='io')h+='<div class="io"><div class="row"><b>I.</b><div>'+d.i+'</div></div><div class="row"><b>II.</b><div>'+d.ii+'</div></div></div>';
  if(d.img)h+='<figure class="fig"><img src="'+(QIMG[d.n]||'')+'" alt="第'+d.n+'题原图" loading="lazy"><figcaption>'+(d.cap||'')+'</figcaption></figure>';
  h+='<div class="opts">';
  optionList(d).forEach(([k,t])=>{h+='<div class="opt" data-k="'+k+'"><span class="k">'+k+'</span><span>'+t+'</span></div>';});
  h+='</div><div class="toggle">▸ 查看答案与解析</div>';
  h+='<div class="reveal"><div class="ans">✅ 正确答案：'+d.ans+'</div><div class="exp">'+d.exp+'</div></div>';
  card.innerHTML=h;
  const reveal=card.querySelector('.reveal'),opts=card.querySelectorAll('.opt');
  function showAns(){reveal.classList.add('show');opts.forEach(o=>{if(o.dataset.k===d.ans)o.classList.add('correct');});}
  function reset(){reveal.classList.remove('show');opts.forEach(o=>o.classList.remove('correct','wrong'));}
  card._reset=reset;
  opts.forEach(o=>o.addEventListener('click',()=>{
    if(o.classList.contains('correct')||o.classList.contains('wrong'))return;
    const correct=o.dataset.k===d.ans;
    o.classList.add(correct?'correct':'wrong');showAns();
    if(correct)removeWrong(d.n);else addWrong(d.n);
    markDone(d.n);
    if(quiz.active&&quiz.ids.includes(d.n)&&!(d.n in quiz.ans)){quiz.ans[d.n]=correct;updateQuizBar();}
  }));
  card.querySelector('.toggle').addEventListener('click',()=>{reveal.classList.contains('show')?reset():showAns();});
  return card;
}
DATA.forEach(d=>listEl.appendChild(buildCard(d)));
updateWrongCount();

/* ====== 下拉填充 ====== */
const CATS=[];DATA.forEach(d=>{if(!CATS.includes(d.cat))CATS.push(d.cat);});
const catSel=document.getElementById('catSel'),quizCatSel=document.getElementById('quizCatSel');
catSel.innerHTML='<option value="*">全部考点（140 题）</option>'+CATS.map(c=>`<option value="${c}">${c}（${DATA.filter(d=>d.cat===c).length}）</option>`).join('');
quizCatSel.innerHTML=CATS.map(c=>`<option value="${c}">${c}（${DATA.filter(d=>d.cat===c).length}）</option>`).join('');

/* ====== 模式与渲染 ====== */
const summaryBox=document.getElementById('summaryBox'),quizCfg=document.getElementById('quizCfg'),
 resultBox=document.getElementById('resultBox'),browseTools=document.getElementById('browseTools'),
 counter=document.getElementById('counter'),emptyEl=document.getElementById('empty'),quizBar=document.getElementById('quizBar');
summaryBox.innerHTML=SUMMARY;
let mode='all';

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  [summaryBox,quizCfg,resultBox,browseTools,counter,emptyEl].forEach(e=>e.classList.add('hidden'));
  listEl.classList.add('hidden');
  if(!quiz.active)quizBar.classList.remove('show');
  document.getElementById('clearWrong').classList.add('hidden');
  if(m==='sum'){summaryBox.classList.remove('hidden');return;}
  if(m==='quiz'){ if(quiz.active){renderList(quiz.ids);} else {quizCfg.classList.remove('hidden');} return;}
  if(m==='all'){browseTools.classList.remove('hidden');counter.classList.remove('hidden');renderBrowse();return;}
  if(m==='wrong'){
    browseTools.classList.remove('hidden');counter.classList.remove('hidden');
    document.getElementById('clearWrong').classList.remove('hidden');
    if(!wrong.length){emptyEl.classList.remove('hidden');emptyEl.innerHTML='<div class="big">🎉</div>错题本是空的！<br>答错的题会自动收进这里。';counter.textContent='';return;}
    renderList(wrong.slice(),true);counter.textContent='错题 '+wrong.length+' 题（已重置，可重新作答）';
  }
}
function renderBrowse(){
  const cat=catSel.value,kw=document.getElementById('search').value.trim().toLowerCase();
  let shown=0;listEl.classList.remove('hidden');
  document.querySelectorAll('.q').forEach(c=>{
    const n=+c.id.slice(1);
    const okCat=cat==='*'||c.dataset.cat===cat;
    const okKw=!kw||c.dataset.text.includes(kw)||(''+n)===kw;
    if(okCat&&okKw){c.classList.remove('hidden');shown++;}else c.classList.add('hidden');
  });
  counter.textContent='显示 '+shown+' 题';
}
function renderList(ids,reset){
  listEl.classList.remove('hidden');
  const set=new Set(ids);
  document.querySelectorAll('.q').forEach(c=>{
    const n=+c.id.slice(1);
    if(set.has(n)){c.classList.remove('hidden');if(reset)c._reset();}else c.classList.add('hidden');
  });
  // 按 ids 顺序排列
  ids.forEach(n=>{const c=document.getElementById('q'+n);if(c)listEl.appendChild(c);});
}

document.getElementById('modebar').addEventListener('click',e=>{
  const b=e.target.closest('.mode');if(!b)return;
  if(b.dataset.mode!=='quiz'&&quiz.active){if(!confirm('退出当前测验？本轮进度将清空。'))return;endQuiz();}
  setMode(b.dataset.mode);window.scrollTo({top:0,behavior:'smooth'});
});
catSel.addEventListener('change',renderBrowse);
document.getElementById('search').addEventListener('input',renderBrowse);
document.getElementById('revealAll').addEventListener('click',()=>{
  DATA.forEach(d=>{const c=document.getElementById('q'+d.n);if(c&&!c.classList.contains('hidden')){
    c.querySelector('.reveal').classList.add('show');c.querySelectorAll('.opt').forEach(o=>{if(o.dataset.k===d.ans)o.classList.add('correct');});}});
});
document.getElementById('hideAll').addEventListener('click',()=>document.querySelectorAll('.q:not(.hidden)').forEach(c=>c._reset()));
document.getElementById('clearWrong').addEventListener('click',()=>{
  if(wrong.length&&confirm('确定清空错题本吗？')){wrong.slice().forEach(n=>markCard(n,false));wrong=[];saveWrong();setMode('wrong');}
});

/* ====== 测验逻辑 ====== */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(ids){
  if(!ids.length){alert('没有可用的题目。');return;}
  quiz={active:true,ids:ids.slice(),ans:{}};
  resultBox.classList.add('hidden');quizCfg.classList.add('hidden');
  setMode('quiz');renderList(quiz.ids,true);
  quizBar.classList.add('show');updateQuizBar();window.scrollTo({top:0,behavior:'smooth'});
}
function updateQuizBar(){
  const tot=quiz.ids.length,a=Object.keys(quiz.ans).length;
  const ok=Object.values(quiz.ans).filter(Boolean).length,no=a-ok;
  document.getElementById('quizProg').innerHTML=`本轮 ${tot} 题 · 已答 ${a} · <span class="ok">✅ ${ok}</span> · <span class="no">❌ ${no}</span>`;
}
document.getElementById('quizCfg').addEventListener('click',e=>{
  const b=e.target.closest('[data-quiz]');if(!b)return;const t=b.dataset.quiz;
  if(t==='all')startQuiz(DATA.map(d=>d.n));
  else if(t==='r30')startQuiz(shuffle(DATA.map(d=>d.n)).slice(0,30));
  else if(t==='r50')startQuiz(shuffle(DATA.map(d=>d.n)).slice(0,50));
  else if(t==='wrong'){if(!wrong.length){alert('错题本是空的，先去刷题吧！');return;}startQuiz(wrong.slice());}
  else if(t==='cat')startQuiz(DATA.filter(d=>d.cat===quizCatSel.value).map(d=>d.n));
});
document.getElementById('quizExit').addEventListener('click',()=>{if(confirm('退出测验？本轮进度将清空。')){endQuiz();setMode('all');}});
function endQuiz(){quiz={active:false,ids:[],ans:{}};quizBar.classList.remove('show');}

document.getElementById('quizFinish').addEventListener('click',showResult);
function showResult(){
  const ids=quiz.ids,answered=Object.keys(quiz.ans).map(Number);
  const wrongIds=ids.filter(n=>quiz.ans[n]===false);
  const unanswered=ids.filter(n=>!(n in quiz.ans));
  const ok=ids.filter(n=>quiz.ans[n]===true).length;
  const pct=Math.round(ok/ids.length*100);
  // 易错考点统计
  const tally={};wrongIds.forEach(n=>{const c=DATA.find(d=>d.n===n).cat;tally[c]=(tally[c]||0)+1;});
  const weak=Object.entries(tally).sort((a,b)=>b[1]-a[1]);
  let h=`<h2>📊 本轮成绩</h2>
   <div class="score" style="color:${pct>=80?'var(--green)':pct>=60?'var(--orange)':'var(--red)'}">${pct}<small>%</small></div>
   <div class="stat" style="text-align:center">共 ${ids.length} 题 · 对 ${ok} · 错 ${wrongIds.length}${unanswered.length?' · 未答 '+unanswered.length:''}</div>`;
  if(!wrongIds.length&&!unanswered.length){
    h+=`<div class="perfect">🎉 全部答对！太棒了！</div>`;
  }else{
    if(weak.length){
      h+=`<h3>🎯 你最易错的考点（按错题数）</h3>`;
      weak.forEach(([c,cnt])=>{h+=`<div class="weak"><div class="wt">${c} · 错 ${cnt} 题</div><div class="wk">📌 ${KP[c]}</div></div>`;});
    }
    h+=`<h3>📕 本轮错题（点击跳转复习）</h3><div class="wronglist">`+
      wrongIds.map(n=>`<span class="wchip" data-jump="${n}">第 ${n} 题 ✗</span>`).join('')+
      unanswered.map(n=>`<span class="wchip" data-jump="${n}">第 ${n} 题（未答）</span>`).join('')+`</div>`;
  }
  h+=`<div class="resbtns">`;
  if(wrongIds.length)h+=`<button class="btn primary" id="redoWrong">重做这 ${wrongIds.length} 道错题</button>`;
  h+=`<button class="btn" id="againRound">再来一轮</button><button class="btn danger" id="quitQuiz">结束测验</button></div>`;
  resultBox.innerHTML=h;
  // 显示结果，隐藏题目与底栏
  document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode==='quiz'));
  [summaryBox,quizCfg,browseTools,counter,emptyEl,listEl].forEach(e=>e.classList.add('hidden'));
  quizBar.classList.remove('show');resultBox.classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
  resultBox.querySelectorAll('[data-jump]').forEach(ch=>ch.addEventListener('click',()=>{
    const n=+ch.dataset.jump;resultBox.classList.add('hidden');listEl.classList.remove('hidden');
    quizBar.classList.add('show');renderList(quiz.ids);
    const c=document.getElementById('q'+n);if(c){c.querySelector('.reveal').classList.add('show');
      c.querySelectorAll('.opt').forEach(o=>{if(o.dataset.k===DATA.find(d=>d.n===n).ans)o.classList.add('correct');});
      c.scrollIntoView({behavior:'smooth',block:'center'});}
  }));
  const rw=document.getElementById('redoWrong');if(rw)rw.addEventListener('click',()=>startQuiz(wrongIds));
  document.getElementById('againRound').addEventListener('click',()=>{endQuiz();setMode('quiz');});
  document.getElementById('quitQuiz').addEventListener('click',()=>{endQuiz();setMode('all');});
}

document.getElementById('progReset').addEventListener('click',()=>{
  if(done.length&&confirm('重置做题进度吗？（不会清空错题本）')){done=[];try{localStorage.setItem('nc_done','[]');}catch(e){}updateProgress();}
});
updateProgress();
setMode('all');
</script>
</body>
